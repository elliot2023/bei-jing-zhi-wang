<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>北境之王 — 冒险之旅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a0a2e,#0a1a3e,#0a2a1a);display:flex;flex-direction:column;
align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
#wrap{position:relative}
#gameCanvas{display:block;border-radius:10px}
#scanlines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
border-radius:10px;z-index:20}
#neon{position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border:3px solid #ff88cc;
border-radius:14px;pointer-events:none;z-index:19;
box-shadow:0 0 15px rgba(255,136,204,.4),inset 0 0 15px rgba(255,136,204,.1);
animation:np 2s ease-in-out infinite}
@keyframes np{0%,100%{box-shadow:0 0 15px rgba(255,136,204,.4),inset 0 0 15px rgba(255,136,204,.1)}
50%{box-shadow:0 0 30px rgba(255,136,204,.7),inset 0 0 30px rgba(255,136,204,.2)}}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:radial-gradient(ellipse at 50% 30%,rgba(30,15,50,.9),rgba(5,2,15,.95));
z-index:30;border-radius:10px}
.overlay.hidden{display:none!important}
#titleScreen h1{color:#ff88cc;font-size:42px;text-shadow:0 0 30px #ff66aa,2px 2px 0 #aa4477,0 0 80px rgba(255,102,170,.3);
margin-bottom:4px;letter-spacing:8px;animation:titleShimmer 3s ease-in-out infinite;background:linear-gradient(90deg,#ff88cc,#ffaadd,#ff88cc,#ffccdd,#ff88cc);
background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,136,204,.6))}
@keyframes titleShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#titleScreen .sub{color:#ffcc00;font-size:20px;margin-bottom:8px;text-shadow:0 0 15px #ffcc00,0 0 40px rgba(255,200,0,.3);letter-spacing:6px}
#titleScreen .welcome{color:#88ffcc;font-size:14px;margin-bottom:12px;text-shadow:0 0 10px #88ffcc;
font-style:italic;opacity:.85;max-width:400px;line-height:1.6}
#titleScreen .ctrl{color:rgba(255,255,255,.5);font-size:12px;line-height:2;text-align:center;margin-bottom:12px}
#titleScreen .ctrl b{color:#ffcc00;font-weight:normal}
#titleScreen .ctrl .p1{color:#88ccff}
#titleScreen .ctrl .p2{color:#ff8888}
.btn{padding:12px 44px;font-size:18px;font-family:inherit;
background:linear-gradient(135deg,#ff88cc 0%,#cc4499 50%,#ff88cc 100%);background-size:200% 200%;
color:#fff;border:2px solid rgba(255,170,221,.6);border-radius:30px;cursor:pointer;
font-weight:bold;letter-spacing:3px;position:relative;overflow:hidden;
box-shadow:0 4px 20px rgba(255,136,204,.4),0 0 40px rgba(255,136,204,.15),inset 0 1px 0 rgba(255,255,255,.2);
transition:all .2s;z-index:31}
.btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.15) 50%,transparent 70%);
animation:btnShine 3s ease-in-out infinite}
@keyframes btnShine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
.btn:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 6px 30px rgba(255,136,204,.6),0 0 60px rgba(255,136,204,.2);
background-position:100% 0}
.btn:active{transform:scale(.97) translateY(1px);box-shadow:0 2px 10px rgba(255,136,204,.4)}
.btn-sm{padding:10px 28px;font-size:15px}
.btn-green{background:linear-gradient(135deg,#44bb66,#228844);border-color:rgba(102,221,136,.6);
box-shadow:0 4px 20px rgba(68,187,102,.4),inset 0 1px 0 rgba(255,255,255,.15)}
.btn-green:hover{box-shadow:0 6px 30px rgba(68,187,102,.6),0 0 50px rgba(68,187,102,.15);transform:scale(1.06) translateY(-2px)}
.btn-blue{background:linear-gradient(135deg,#4488ff,#2255cc);border-color:rgba(102,170,255,.6);
box-shadow:0 4px 20px rgba(68,136,255,.4),inset 0 1px 0 rgba(255,255,255,.15)}
.btn-blue:hover{box-shadow:0 6px 30px rgba(68,136,255,.6),0 0 50px rgba(68,136,255,.15);transform:scale(1.06) translateY(-2px)}
#goScreen h1{font-size:48px;letter-spacing:10px;margin-bottom:10px;
animation:goTitlePulse 1.5s ease-in-out infinite}
@keyframes goTitlePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.03)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
#goScreen .fs{color:#ffcc00;font-size:24px;margin:12px 0;text-shadow:0 0 15px rgba(255,200,0,.6);
font-weight:bold}
#goScreen .fl{color:#88ffcc;font-size:16px;margin-bottom:8px;text-shadow:0 0 10px rgba(136,255,204,.4)}
#goScreen .encourage{color:#ff88cc;font-size:18px;margin-bottom:16px;text-shadow:0 0 15px rgba(255,136,204,.5);
animation:fadeIn .8s}
#goScreen h1.win{color:#ffcc00;text-shadow:0 0 30px #ffcc00,0 0 60px #ff8800,0 0 100px rgba(255,200,0,.3);
animation:winGlow 2s ease-in-out infinite}
@keyframes winGlow{0%,100%{text-shadow:0 0 30px #ffcc00,0 0 60px #ff8800}50%{text-shadow:0 0 50px #ffcc00,0 0 100px #ff8800,0 0 150px rgba(255,200,0,.3)}}
#goScreen h1.lose{color:#ff8888;text-shadow:0 0 30px #ff6666,0 0 60px rgba(255,68,68,.4)}
/* Story dialog box */
#storyBox{position:absolute;top:0;left:0;width:100%;height:100%;
background:radial-gradient(ellipse at 50% 50%,rgba(10,5,20,.85),rgba(0,0,0,.92));
z-index:55;display:flex;align-items:center;justify-content:center;
cursor:pointer;animation:fadeIn .5s;pointer-events:none}
#storyBox.hidden{display:none!important}
#storyBox:not(.hidden){pointer-events:auto}
#storyContent{background:linear-gradient(170deg,rgba(30,15,50,.95) 0%,rgba(15,8,30,.98) 100%);
border:1.5px solid rgba(255,200,100,.3);border-radius:20px;padding:35px 45px;max-width:480px;
text-align:center;position:relative;overflow:hidden;
box-shadow:0 0 60px rgba(255,150,50,.12),0 0 120px rgba(255,100,50,.06),inset 0 0 40px rgba(0,0,0,.3);
animation:storyPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes storyPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#storyContent::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(255,200,100,.4),transparent)}
#storyContent::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(ellipse at 50% 0%,rgba(255,200,100,.06),transparent 60%);pointer-events:none}
#storyText{color:#e8d8c0;font-size:17px;line-height:1.9;letter-spacing:.5px;min-height:60px;
text-shadow:0 0 8px rgba(255,200,100,.15);position:relative;z-index:1}
#storyText .boss-line{color:#ff8866;font-size:19px;font-weight:bold;text-shadow:0 0 20px rgba(255,100,50,.4);
font-style:italic}
#storyText .clear-line{color:#88ffcc;font-size:19px;font-weight:bold;text-shadow:0 0 20px rgba(100,255,150,.3)}
#storyText .ending-line{color:#ffcc00;font-size:20px;font-weight:bold;text-shadow:0 0 25px rgba(255,200,0,.4);
letter-spacing:1.5px;line-height:2}
#storyHint{color:rgba(255,255,255,.2);font-size:11px;margin-top:18px;animation:pulse 2.5s infinite;
letter-spacing:2px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#lvlBanner{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
color:#ffcc00;font-size:36px;font-weight:bold;
text-shadow:0 0 25px #ffcc00,0 0 50px #ff8800,0 0 80px rgba(255,200,0,.3);
z-index:15;display:none;letter-spacing:6px;pointer-events:none;text-align:center;
animation:bannerIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes bannerIn{from{transform:translate(-50%,-50%) scale(.5);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#lvlBanner .sub{font-size:16px;color:#88ffcc;letter-spacing:2px;margin-top:6px;
text-shadow:0 0 12px rgba(136,255,204,.5)}
.coin-info{color:#ffcc00;font-size:18px;margin:8px 0;text-shadow:0 0 10px #ffcc00}
.countdown{color:#ff8888;font-size:56px;font-weight:bold;text-shadow:0 0 30px rgba(255,100,100,.6),0 0 60px rgba(255,100,100,.2);
margin:8px 0;animation:goTitlePulse 1.5s infinite;font-family:'Courier New',monospace}
.coin-btn{background:linear-gradient(135deg,#ffcc00,#ff8800)!important;border-color:rgba(255,221,68,.6)!important;
color:#000!important;box-shadow:0 4px 20px rgba(255,200,0,.5),inset 0 1px 0 rgba(255,255,255,.3)!important}
.coin-btn:hover{box-shadow:0 6px 30px rgba(255,200,0,.7),0 0 60px rgba(255,200,0,.2)!important;transform:scale(1.06) translateY(-2px)!important}
.coin-hint{color:rgba(255,255,255,.3);font-size:11px;margin-top:6px}
#continueSection{display:flex;flex-direction:column;align-items:center}
.badge-popup{position:absolute;top:60px;left:50%;transform:translateX(-50%);
background:linear-gradient(135deg,rgba(20,10,30,.92),rgba(10,5,20,.95));
border:1.5px solid rgba(255,200,0,.4);border-radius:14px;padding:12px 24px;
color:#ffcc00;font-size:14px;z-index:25;display:none;white-space:nowrap;
text-shadow:0 0 10px rgba(255,200,0,.5);animation:badgeIn .5s;
box-shadow:0 0 30px rgba(255,200,0,.15),inset 0 0 20px rgba(0,0,0,.2)}
@keyframes badgeIn{from{transform:translateX(-50%) scale(0);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
#highScore{position:absolute;top:8px;right:120px;color:#ffcc00;font-size:11px;z-index:21;
text-shadow:0 0 8px rgba(255,200,0,.5)}
.mode-sel{display:flex;gap:10px;margin:8px 0}
.mode-btn{padding:8px 20px;font-size:13px;font-family:inherit;
background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.15);
border-radius:20px;cursor:pointer;transition:all .25s;backdrop-filter:blur(4px)}
.mode-btn:hover{background:rgba(255,136,204,.15);border-color:rgba(255,136,204,.5);
color:#fff;box-shadow:0 0 15px rgba(255,136,204,.2)}
.mode-btn.active{background:linear-gradient(135deg,rgba(255,136,204,.25),rgba(200,100,180,.15));
border-color:#ff88cc;color:#fff;box-shadow:0 0 20px rgba(255,136,204,.3),inset 0 0 10px rgba(255,136,204,.1)}
/* Connection panel */
#connPanel{position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:radial-gradient(ellipse at 50% 40%,rgba(20,10,40,.95),rgba(5,2,15,.98));
z-index:35;border-radius:10px}
#connPanel.hidden{display:none!important}
#connPanel h2{color:#ffcc00;font-size:28px;margin-bottom:12px;text-shadow:0 0 15px #ffcc00}
#connPanel .desc{color:#aaa;font-size:12px;margin-bottom:12px;text-align:center;max-width:500px;line-height:1.8}
#connPanel .step{color:#88ffcc;font-size:13px;margin:4px 0}
#connPanel textarea{width:480px;height:80px;background:rgba(255,255,255,.08);color:#fff;
border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px;font-size:11px;
font-family:monospace;resize:none;margin:6px 0}
#connPanel textarea:focus{outline:none;border-color:#ff88cc}
#connPanel .status{color:#ff8888;font-size:14px;margin:8px 0;min-height:20px}
#connPanel .status.ok{color:#88ff88}
#connPanel .btn-row{display:flex;gap:12px;margin-top:8px}
#connPanel label{color:#ffcc00;font-size:12px;margin-top:6px}
#netStatus{position:absolute;top:8px;left:120px;color:#88ff88;font-size:11px;z-index:21;
text-shadow:0 0 8px rgba(136,255,136,.5)}
/* Mobile touch controls — overlay inside game area */
#touchControls{display:none;position:absolute;bottom:0;left:0;right:0;height:100%;z-index:50;
pointer-events:none}
.touch-btn{pointer-events:auto;position:absolute;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:16px;font-weight:bold;color:rgba(255,255,255,.65);
background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
-webkit-tap-highlight-color:transparent;touch-action:none;opacity:.7}
.touch-btn:active,.touch-btn.pressed{opacity:1;background:rgba(255,136,204,.3);border-color:#ff88cc}
/* Joystick — bottom left */
#joystick{pointer-events:auto;position:absolute;left:18px;bottom:16px;width:110px;height:110px;
touch-action:none;z-index:51}
#joyBase{position:absolute;left:0;top:0;width:110px;height:110px;border-radius:50%;
background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15)}
#joyKnob{position:absolute;left:35px;top:35px;width:40px;height:40px;border-radius:50%;
background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);
transition:left .08s,top .08s}
/* Jump button — next to joystick */
#btnJump{left:136px;bottom:24px;width:48px;height:48px;background:rgba(68,187,102,.15);
border-color:rgba(68,187,102,.3);font-size:13px}
#btnJump:active,#btnJump.pressed{background:rgba(68,187,102,.4)}
/* Right: shoot, grenade, switch */
#btnShoot{right:10px;bottom:14px;width:48px;height:48px;background:rgba(255,200,0,.15);
border-color:rgba(255,200,0,.3);font-size:13px}
#btnShoot:active,#btnShoot.pressed{background:rgba(255,200,0,.4)}
#btnGrenade{right:66px;bottom:14px;width:40px;height:40px;font-size:16px}
#btnSwitch{right:42px;bottom:60px;width:36px;height:36px;font-size:14px}
/* Mobile top buttons */
.mob-top-btn{display:none;position:absolute;z-index:60;pointer-events:auto;
background:rgba(10,5,20,.6);border:1px solid rgba(255,255,255,.15);border-radius:8px;
color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;
align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;
width:34px;height:30px;backdrop-filter:blur(6px);
box-shadow:0 2px 8px rgba(0,0,0,.3);transition:all .2s}
.mob-top-btn:hover{background:rgba(255,136,204,.2);border-color:rgba(255,136,204,.4);
color:#fff;box-shadow:0 2px 12px rgba(255,136,204,.2)}
.mob-top-btn:active{background:rgba(255,136,204,.4);transform:scale(.9)}
#btnFullscreen{top:6px;right:6px}
#btnRestart{top:6px;left:44px}
#btnExit{top:6px;left:6px}
/* CSS fullscreen fallback */
#wrap.fs-mode{position:fixed!important;top:0!important;left:0!important;
width:100vw!important;height:100vh!important;z-index:9999!important;border-radius:0!important}
#wrap.fs-mode #gameCanvas{width:100%!important;height:100%!important;border-radius:0!important}
#wrap.fs-mode #touchControls{border-radius:0!important}
/* Responsive canvas */
@media(max-width:920px){
  #scanlines,#neon{display:none}
  #titleScreen h1{font-size:28px;letter-spacing:4px}
  #titleScreen .sub{font-size:14px}
  #titleScreen .ctrl{display:none}
  .btn{padding:10px 32px;font-size:15px}
  .mode-sel{gap:6px}
  .mode-btn{padding:6px 14px;font-size:12px}
  #connPanel textarea{width:90vw}
  #connPanel h2{font-size:22px}
  #goScreen h1{font-size:32px}
  .countdown{font-size:40px}
  #highScore{right:60px;font-size:10px}
  #netStatus{left:60px;font-size:10px}
}
@media(max-height:500px){
  #titleScreen .welcome{display:none}
  #titleScreen h1{font-size:24px;margin-bottom:2px}
}
/* Landscape mobile: smaller touch controls */
@media(orientation:landscape)and(max-height:500px){
  #joystick{left:10px;bottom:8px;width:90px;height:90px}
  #joyBase{width:90px;height:90px}
  #joyKnob{left:28px;top:28px;width:34px;height:34px}
  #btnJump{left:108px;bottom:14px;width:40px;height:40px;font-size:12px}
  #btnShoot{right:6px;bottom:8px;width:40px;height:40px;font-size:12px}
  #btnGrenade{right:54px;bottom:8px;width:34px;height:34px;font-size:14px}
  #btnSwitch{right:34px;bottom:48px;width:30px;height:30px;font-size:12px}
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="900" height="500"></canvas>
  <div id="scanlines"></div>
  <div id="neon"></div>
  <div id="highScore"></div>
  <div id="netStatus"></div>
  <div class="badge-popup" id="badgePopup"></div>
  <div class="overlay" id="titleScreen">
    <h1>北境之王</h1>
    <div class="sub">冒 险 之 旅</div>
    <div class="welcome" id="titleStory">北方边境的守护者沉睡千年，如今黑暗势力入侵，唯有勇者才能拯救这片土地……</div>
    <div style="margin-bottom:10px">
      <label style="color:#88ccff;font-size:12px">你的名字：</label>
      <input id="playerName" type="text" value="北北" maxlength="6" style="background:rgba(255,255,255,.1);color:#fff;
      border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:6px 14px;font-size:14px;font-family:inherit;
      width:100px;text-align:center;outline:none">
    </div>
    <div class="mode-sel">
      <button class="mode-btn active" id="mode1">单人冒险</button>
      <button class="mode-btn" id="mode2">本地双人</button>
      <button class="mode-btn" id="mode3">联机房间</button>
    </div>
    <div class="ctrl">
      <span class="p1"><b>WASD</b> 八方向移动 · <b>空格</b> 闪避 · <b>J</b> 射击 · <b>K</b> 手雷 · <b>Q</b> 切枪</span><br>
      <span class="p2"><b>方向键</b> 移动 · <b>L</b> 射击 · <b>;</b> 手雷 · <b>/</b> 切枪</span><br>
      消灭小怪兽 · 收集星星糖果 · 拯救世界！
    </div>
    <button class="btn" id="startBtn">出 发 冒 险 ！</button>
    <div style="color:#888;font-size:11px;margin-top:8px">提示：收集10颗星星加一条命</div>
  </div>
  <!-- Connection Panel -->
  <div id="connPanel" class="hidden">
    <h2 id="connTitle">联机对战</h2>
    <div class="desc" id="connDesc"></div>
    <label id="lblLink" style="display:none">你的联机链接（发给朋友）：</label>
    <textarea id="txtLink" readonly style="display:none;height:50px" onclick="this.select()"></textarea>
    <div class="btn-row" id="linkBtns" style="display:none">
      <button class="btn btn-sm btn-green" id="btnCopyLink">复制链接</button>
    </div>
    <label id="lblRemote" style="display:none">粘贴朋友的连接码：</label>
    <textarea id="txtRemote" style="display:none" placeholder="在这里粘贴..."></textarea>
    <div class="status" id="connStatus"></div>
    <div class="btn-row">
      <button class="btn btn-sm btn-green" id="btnCreate" style="display:none">创建房间</button>
      <button class="btn btn-sm btn-blue" id="btnAccept" style="display:none">确认连接</button>
      <button class="btn btn-sm" id="btnConnBack">返回</button>
    </div>
  </div>
  <div class="overlay hidden" id="goScreen">
    <h1 class="lose" id="goTitle">GAME OVER</h1>
    <div class="fs" id="goScore">得分: 0</div>
    <div class="fl" id="goLevel">关卡: 1</div>
    <div class="encourage" id="goEncourage">没关系北北，再试一次！</div>
    <div id="continueSection">
      <div class="coin-info">无限续命</div>
      <div class="countdown" id="countdown">10</div>
      <button class="btn coin-btn" id="continueBtn">继 续 冒 险 ！</button>
      <div class="coin-hint">按 Enter 或 空格 也可以哦</div>
    </div>
    <button class="btn hidden" id="restartBtn">再 来 一 次 ！</button>
  </div>
  <!-- Story dialog box -->
  <div id="storyBox" class="hidden">
    <div id="storyContent">
      <div id="storyText"></div>
      <div id="storyHint">点击继续</div>
    </div>
  </div>
  <div id="lvlBanner"></div>
  <!-- Mobile touch controls -->
  <div id="touchControls">
    <div id="joystick"><div id="joyBase"></div><div id="joyKnob"></div></div>
    <div class="touch-btn" id="btnJump">闪</div>
    <div class="touch-btn" id="btnShoot">射</div>
    <div class="touch-btn" id="btnGrenade">💣</div>
    <div class="touch-btn" id="btnSwitch">🔫</div>
  </div>
  <div id="btnFullscreen" class="mob-top-btn" title="全屏">⛶</div>
  <div id="btnRestart" class="mob-top-btn" title="重新开始">↻</div>
  <div id="btnExit" class="mob-top-btn" title="退出">✕</div>
</div>

<script>
(function(){
'use strict';
var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
var W=900,H=500;
var MAP_W=2700,MAP_H=1500; // world is 3x canvas size
var camX=0,camY=0; // camera offset

// ====================================================================
//  SIGNALING SERVER
// ====================================================================
function connectSignaling(callback){
  if(sigWs&&sigWs.readyState<=1){if(callback)callback();return}
  var loc=window.location;
  var wsProto=loc.protocol==='https:'?'wss:':'ws:';
  var wsPort=loc.port||(loc.protocol==='https:'?'443':'80');
  var wsUrl=wsProto+'//'+loc.hostname+':'+wsPort;
  console.log('[WS] Connecting to',wsUrl);
  try{sigWs=new WebSocket(wsUrl)}catch(e){document.getElementById('connStatus').textContent='无法连接服务器';return}
  sigWs.onopen=function(){console.log('[WS] Connected');if(callback)callback()};
  sigWs.onerror=function(e){console.error('[WS] Error',e);document.getElementById('connStatus').textContent='无法连接服务器，请检查网络'};
  sigWs.onclose=function(e){console.log('[WS] Closed',e.code,e.reason);};
  sigWs.onmessage=function(e){
    var msg;try{msg=JSON.parse(e.data)}catch(ex){return}
    if(msg.type==='rooms'){roomList=msg.list;renderRoomList()}
    else if(msg.type==='created'){onRoomCreated(msg.id)}
    else if(msg.type==='joined'){onJoinedRoom(msg.hostName)}
    else if(msg.type==='guestJoined'){onGuestJoined(msg.guestName)}
    else if(msg.type==='signal'){onSignal(msg.data)}
    else if(msg.type==='gameStart'){onGameStart()}
    else if(msg.type==='error'){document.getElementById('connStatus').textContent=msg.msg}
    else if(msg.type==='hostLeft'){document.getElementById('connStatus').textContent='房主已离开';gameOn=false}
    else if(msg.type==='guestLeft'){document.getElementById('connStatus').textContent='对方已离开';gameOn=false}
  };
}

// ====================================================================
//  WEBRTC (via signaling server)
// ====================================================================
var RTC_CFG={iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.miwifi.com:3478'},
  {urls:'stun:stun.qq.com:3478'}
]};
var sdpSent=false;
var pendingCands=[];

function createHost(){
  console.log('[Host] Creating RTCPeerConnection...');
  sdpSent=false;
  peerConn=new RTCPeerConnection(RTC_CFG);
  peerConn.onconnectionstatechange=function(){console.log('[Host] Connection state:',peerConn.connectionState)};
  peerConn.oniceconnectionstatechange=function(){console.log('[Host] ICE state:',peerConn.iceConnectionState)};
  dataChannel=peerConn.createDataChannel('game',{ordered:false});
  setupChannel(dataChannel);
  // Trickle ICE: send each candidate as it arrives
  peerConn.onicecandidate=function(e){
    if(e.candidate){
      console.log('[Host] Sending ICE candidate');
      sendSignal({type:'candidate',candidate:e.candidate});
    }
  };
  peerConn.onicecandidateerror=function(e){console.warn('[Host] ICE error:',e.errorText||e)};
  peerConn.createOffer().then(function(d){
    console.log('[Host] Offer created, setting local desc...');
    return peerConn.setLocalDescription(d);
  }).then(function(){
    // Send offer immediately (trickle ICE), with timeout fallback
    setTimeout(function(){if(!sdpSent){sdpSent=true;console.log('[Host] Sending offer (immediate)');sendSignal(peerConn.localDescription)}},500);
    setTimeout(function(){if(!sdpSent){sdpSent=true;console.log('[Host] Sending offer (timeout fallback)');sendSignal(peerConn.localDescription)}},3000);
  }).catch(function(e){
    document.getElementById('connStatus').textContent='连接失败：'+e.message});
}

// Prepare guest peer connection early (called when guest joins room)
function prepareGuestPeer(){
  if(peerConn)return;
  peerConn=new RTCPeerConnection(RTC_CFG);
  peerConn.onconnectionstatechange=function(){console.log('[Guest] Connection state:',peerConn.connectionState)};
  peerConn.oniceconnectionstatechange=function(){console.log('[Guest] ICE state:',peerConn.iceConnectionState)};
  peerConn.ondatachannel=function(e){setupChannel(e.channel)};
  peerConn.onicecandidate=function(e){
    if(e.candidate){
      console.log('[Guest] Sending ICE candidate');
      sendSignal({type:'candidate',candidate:e.candidate});
    }
  };
  peerConn.onicecandidateerror=function(e){console.warn('[Guest] ICE error:',e.errorText||e)};
}

// Called when guest receives the host's offer
function handleOffer(offer){
  console.log('[Guest] Received offer, setting remote desc...');
  if(!peerConn)prepareGuestPeer();
  sdpSent=false;
  peerConn.setRemoteDescription(new RTCSessionDescription(offer)).then(function(){
    console.log('[Guest] Remote desc set, creating answer...');
    // Flush pending candidates
    for(var i=0;i<pendingCands.length;i++){
      peerConn.addIceCandidate(new RTCIceCandidate(pendingCands[i])).catch(function(e){console.warn('[ICE] addCandidate error:',e)});
    }
    pendingCands=[];
    return peerConn.createAnswer()}).then(function(d){
    console.log('[Guest] Answer created, setting local desc...');
    return peerConn.setLocalDescription(d)}).then(function(){
    setTimeout(function(){if(!sdpSent){sdpSent=true;sendSignal(peerConn.localDescription)}},500);
    setTimeout(function(){if(!sdpSent){sdpSent=true;sendSignal(peerConn.localDescription)}},3000);
  }).catch(function(e){document.getElementById('connStatus').textContent='连接失败：'+e.message});
}

function sendSignal(desc){
  if(sigWs&&sigWs.readyState===1)sigWs.send(JSON.stringify({type:'signal',data:desc}));
}

function onSignal(data){
  console.log('[Signal] Received:',data.type);
  if(data.type==='offer'){handleOffer(data)}
  else if(data.type==='answer'){
    if(peerConn)peerConn.setRemoteDescription(new RTCSessionDescription(data)).then(function(){
      // Flush pending candidates
      for(var i=0;i<pendingCands.length;i++){
        peerConn.addIceCandidate(new RTCIceCandidate(pendingCands[i])).catch(function(e){console.warn('[ICE] addCandidate error:',e)});
      }
      pendingCands=[];
    });
  }
  else if(data.type==='candidate'&&data.candidate){
    if(peerConn&&peerConn.remoteDescription&&peerConn.remoteDescription.type){
      peerConn.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(function(e){console.warn('[ICE] addCandidate error:',e)});
    }else{
      console.log('[ICE] Queuing candidate (no remote desc yet)');
      pendingCands.push(data.candidate);
    }
  }
}

function setupChannel(ch){
  ch.onopen=function(){
    console.log('[Channel] Open! netMode='+netMode);
    document.getElementById('connStatus').textContent='✅ 连接成功！';
    document.getElementById('connStatus').className='status ok';
    netStatusEl.textContent='🟢 已连接';
    if(netMode==='host'&&sigWs&&sigWs.readyState===1)sigWs.send(JSON.stringify({type:'start'}));
  };
  ch.onclose=function(){console.log('[Channel] Closed');netStatusEl.textContent='🔴 已断开';gameOn=false};
  ch.onerror=function(e){console.log('[Channel] Error',e);document.getElementById('connStatus').textContent='连接错误'};
  ch.onmessage=function(e){
    try{var msg=JSON.parse(e.data);
      if(netMode==='guest'&&msg.type==='state')applyGameState(msg.d);
      if(netMode==='host'&&msg.type==='input')guestInput=msg.d;
    }catch(ex){}
  };
}

function sendMsg(msg){
  if(dataChannel&&dataChannel.readyState==='open'){try{dataChannel.send(JSON.stringify(msg))}catch(e){}}
}

function startNetworkGame(){

  if(netMode==='guest'&&players.length>1)players[1].pName=playerName;

}

var parts=[];
// shape: 'rect','circle','star','heart','ring'
function Pt(x,y,c,vx,vy,life,sz,shape,rot,rotSpd){
  this.x=x;this.y=y;this.c=c;this.vx=vx;this.vy=vy;this.life=life;this.ml=life;this.sz=sz||3;
  this.shape=shape||'rect';this.rot=rot||0;this.rotSpd=rotSpd||0;
}
Pt.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=.12;this.life--;this.rot+=this.rotSpd};
Pt.prototype.draw=function(){
  var a=this.life/this.ml;ctx.globalAlpha=a;ctx.fillStyle=this.c;
  var s=this.sz*(a*.5+.5);
  if(this.shape==='circle'){
    ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.fill();
  }else if(this.shape==='star'){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.beginPath();for(var i=0;i<5;i++){var ang=i*Math.PI*2/5-Math.PI/2;var r=i%2===0?s:s*.45;ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r)}ctx.closePath();ctx.fill();ctx.restore();
  }else if(this.shape==='heart'){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);var hs=s*.6;
    ctx.beginPath();ctx.arc(-hs*.35,-hs*.3,hs*.5,0,Math.PI*2);ctx.arc(hs*.35,-hs*.3,hs*.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-hs*.8,0);ctx.quadraticCurveTo(0,hs*1.2,hs*.8,0);ctx.fill();ctx.restore();
  }else if(this.shape==='ring'){
    ctx.strokeStyle=this.c;ctx.lineWidth=Math.max(1,s*.3);ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.stroke();
  }else{
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillRect(-s/2,-s/2,s,s);ctx.restore();
  }
  ctx.globalAlpha=1;
};
function boom(x,y,c,n,opts){
  opts=opts||{};
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,sp=(opts.spd||4)*Math.random()+(opts.spdMin||1);
    var shape=opts.shapes?opts.shapes[~~(Math.random()*opts.shapes.length)]:(opts.shape||'rect');
    var rs=(Math.random()-.5)*(opts.rotSpd||.2);
    var sz=opts.sz?opts.sz*Math.random()+(opts.szMin||1):Math.random()*4+2;
    var life=opts.life?~~(opts.life*Math.random()+(opts.lifeMin||10)):~~(Math.random()*20+12);
    var vy=opts.vy!==undefined?opts.vy:(-2);
    parts.push(new Pt(x,y,c,Math.cos(a)*sp,Math.sin(a)*sp+vy,life,sz,shape,Math.random()*Math.PI*2,rs));
  }
}

  if(this.type==='balloon'){
    ctx.beginPath();ctx.ellipse(0,bob,this.w/2-2,this.h/2-2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(-4,-6+bob,4,6,-.3,0,Math.PI*2);ctx.fill();
  }else if(this.type==='rainbowBubble'){
    ctx.beginPath();ctx.arc(0,bob,this.w/2-2,0,Math.PI*2);ctx.fill();
    var rb=ctx.createLinearGradient(-this.w/2,0,this.w/2,0);
    rb.addColorStop(0,'#ff8888');rb.addColorStop(.25,'#ffcc44');rb.addColorStop(.5,'#88ff88');rb.addColorStop(.75,'#4488ff');rb.addColorStop(1,'#cc88ff');
    ctx.strokeStyle=rb;ctx.lineWidth=2;ctx.globalAlpha=.4;ctx.stroke();ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(-3,-4+bob,3,5,-.3,0,Math.PI*2);ctx.fill();
  }else{
    ctx.beginPath();ctx.roundRect(-this.w/2,-this.h/2+bob,this.w,this.h,6);ctx.fill();
    ctx.strokeStyle=shadeColor(col,-20);ctx.lineWidth=1;ctx.globalAlpha=.3;
    ctx.beginPath();ctx.roundRect(-this.w/2,-this.h/2+bob,this.w,this.h,6);ctx.stroke();ctx.globalAlpha=1;
  }
  // Crack lines when damaged
  if(hpR<1){
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-4,-2+bob);ctx.lineTo(2,4+bob);ctx.stroke();
    if(hpR<.5){ctx.beginPath();ctx.moveTo(3,-4+bob);ctx.lineTo(-2,3+bob);ctx.stroke()}
  }
  // HP bar
  if(hpR<1){
    var bw=this.w-4,bh=3,bx=-bw/2,by=-this.h/2-8+bob;
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(bx-1,by-1,bw+2,bh+2,2);ctx.fill();
    var hc=hpR>.5?'#88ff88':hpR>.25?'#ffcc00':'#ff4444';
    ctx.fillStyle=hc;ctx.beginPath();ctx.roundRect(bx,by,bw*hpR,bh,1);ctx.fill();
  }
  ctx.restore();
};

Destructible.prototype.hurt=function(d){
  this.hp-=d;this.flash=6;
  boom(this.x+this.w/2,this.y+this.h/2,'#fff',4,{shape:'rect',spd:3,sz:3,life:15});
  if(this.hp<=0){
    this.alive=false;
    var t=DESTRUCT_TYPES[this.type];
    var cx=this.x+this.w/2,cy=this.y+this.h/2;
    boom(cx,cy,t.color,12,{shape:'circle',spd:4,sz:5,life:25});
    boom(cx,cy,'#fff',6,{shape:'star',spd:3,sz:4,life:20});
    shakeAmt=3;snd('explode');
    // Drop collectible
    if(Math.random()<t.dropChance){
      collectibles.push(new Collect(this.x,this.y,t.drop));
    }
    // Special: crystalBall clears all enemies
    if(this.type==='crystalBall'){
      for(var i=enemies.length-1;i>=0;i--){boom(enemies[i].x+14,enemies[i].y+14,'#88ddff',8);enemies.splice(i,1)}
      floatTxt(cx,cy,'全屏清怪！','#88ddff',18);shakeAmt=8;
    }
    // Special: urchin hurts nearby player
    if(t.hurtOnTouch){
      for(var p=0;p<players.length;p++){var d2=Math.abs(cx-players[p].x)+Math.abs(cy-players[p].y);if(d2<80)players[p].hurt()}
    }
  }
};

function Hazard(x,y,type){

Hazard.prototype.draw=function(){
  var t=HAZARD_TYPES[this.type];
  var cx=this.x+this.w/2,cy=this.y+this.h/2;
  this.af++;
  ctx.save();ctx.translate(cx,cy);
  if(this.type==='chocolate'){
    // Chocolate swamp - dark brown pool
    var cg=ctx.createRadialGradient(0,0,0,0,0,this.w/2);
    cg.addColorStop(0,'rgba(80,40,10,.7)');cg.addColorStop(.7,'rgba(60,30,5,.5)');cg.addColorStop(1,'rgba(40,20,0,.2)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(0,0,this.w/2,this.h/2,0,0,Math.PI*2);ctx.fill();
    // Bubbles
    ctx.fillStyle='rgba(100,60,20,.4)';
    ctx.beginPath();ctx.arc(-10+Math.sin(this.af*.03)*5,-5,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8+Math.sin(this.af*.04+2)*4,3,2,0,Math.PI*2);ctx.fill();
  }else if(this.type==='jellyfish'){
    // Jellyfish - translucent dome + tentacles
    var ja=Math.sin(this.af*.02)*8;
    ctx.globalAlpha=.6+Math.sin(this.af*.05)*.2;
    var jg=ctx.createRadialGradient(-2,-4,0,0,0,14);
    jg.addColorStop(0,'rgba(220,180,255,.7)');jg.addColorStop(1,'rgba(150,80,200,.3)');
    ctx.fillStyle=jg;ctx.beginPath();ctx.arc(0,-2+ja,12,Math.PI,0);ctx.fill();
    // Tentacles
    ctx.strokeStyle='rgba(180,120,220,.5)';ctx.lineWidth=1.5;
    for(var ti=-2;ti<=2;ti++){
      ctx.beginPath();ctx.moveTo(ti*5,ja);ctx.quadraticCurveTo(ti*5+Math.sin(this.af*.06+ti)*6,10+ja,ti*5+Math.sin(this.af*.04+ti)*4,18+ja);ctx.stroke();
    }
    // Eyes
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(-4,-4+ja,2,0,Math.PI*2);ctx.arc(4,-4+ja,2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }else if(this.type==='spring'){
    // Spring pad - coiled spring
    ctx.fillStyle='#44cc44';ctx.beginPath();ctx.roundRect(-this.w/2,0,this.w,this.h/2,3);ctx.fill();
    ctx.strokeStyle='#88ff88';ctx.lineWidth=2;
    for(var si=0;si<4;si++){
      ctx.beginPath();ctx.arc(0,-si*3,this.w/3,0,Math.PI);ctx.stroke();
    }
    ctx.fillStyle='#66ee66';ctx.beginPath();ctx.roundRect(-this.w/2-2,-2,this.w+4,6,3);ctx.fill();
  }else if(this.type==='blackhole'){
    // Black hole - dark vortex with purple glow
    var ba=this.af*.08;
    for(var bi=3;bi>=0;bi--){
      ctx.strokeStyle='rgba(100,0,180,'+(0.15+bi*.05)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,10+bi*8,ba+bi*.5,ba+bi*.5+4);ctx.stroke();
    }
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(150,0,255,.3)';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  }else if(this.type==='portal'){
    // Portal - swirling ring
    var pa=this.af*.1;
    ctx.strokeStyle='rgba(68,221,255,.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,14,pa,pa+5);ctx.stroke();
    ctx.strokeStyle='rgba(100,200,255,.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,10,pa+2,pa+4.5);ctx.stroke();
    ctx.fillStyle='rgba(68,221,255,.15)';ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
    // Arrow indicator
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('⇔',0,4);ctx.textAlign='left';
  }
  ctx.restore();
};

var pet={x:180,y:240,targetX:180,targetY:240,af:0,shootCd:0};
function updatePet(){
  pet.af++;
  var tx=players[0].x-20+Math.sin(pet.af*.04)*15;
  var ty=players[0].y-20+Math.cos(pet.af*.05)*15;
  pet.targetX=tx;pet.targetY=ty;
  pet.x+=(pet.targetX-pet.x)*.08;pet.y+=(pet.targetY-pet.y)*.08;
  pet.shootCd--;
  if(pet.shootCd<=0&&(enemies.length>0||boss)){
    var nearest=null,nd=9999;
    for(var i=0;i<enemies.length;i++){var d=Math.abs(enemies[i].x-pet.x)+Math.abs(enemies[i].y-pet.y);if(d<nd){nd=d;nearest=enemies[i]}}
    if(boss){var bd=Math.abs(boss.x+40-pet.x)+Math.abs(boss.y+40-pet.y);if(bd<nd)nearest=boss}
    if(nearest&&nd<300){
      var txa=nearest.x+(nearest.w?nearest.w/2:14),tya=nearest.y+(nearest.h?nearest.h/2:14);
      var a=Math.atan2(tya-pet.y,txa-pet.x);
      bullets.push(new Bullet(pet.x,pet.y,Math.cos(a)*7,Math.sin(a)*7,4,4,'#ffaa00'));
      pet.shootCd=45;
    }
  }
}
function drawPet(){
  var x=pet.x,y=pet.y;
  ctx.globalAlpha=.2+Math.sin(pet.af*.08)*.15;ctx.fillStyle='#ffcc00';
  ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.save();ctx.translate(x,y);ctx.rotate(pet.af*.03);
  ctx.fillStyle='#ffcc00';ctx.beginPath();
  for(var i=0;i<5;i++){var a=i*Math.PI*2/5-Math.PI/2,r=i%2===0?12:6;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
  ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();
  for(var i=0;i<5;i++){var a=i*Math.PI*2/5-Math.PI/2,r=i%2===0?6:3;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
  ctx.closePath();ctx.fill();ctx.restore();
  ctx.fillStyle='#333';ctx.fillRect(x-4,y-2,3,3);ctx.fillRect(x+2,y-2,3,3);
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y+2,4,.1*Math.PI,.9*Math.PI);ctx.stroke();
}

      var fx2=x+Math.cos(fa)*10,fy2=y-4+Math.sin(fa)*8+bob;
      ctx.fillStyle=flc[fi2];ctx.beginPath();ctx.arc(fx2,fy2,3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fx2,fy2,1.5,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

function drawGroundDecorations(ctx,theme,ft,af){
  // Small flowers and grass patches — spread across full map, only draw visible ones
  var vLeft=camX-50,vTop=camY-50,vRight=camX+W+50,vBottom=camY+H+50;
  for(var i=0;i<120;i++){
    var dx=(i*151+73)%MAP_W,dy=(i*113+91)%(MAP_H-70)+55;
    if(dx<vLeft||dx>vRight||dy<vTop||dy>vBottom)continue;
    ctx.globalAlpha=.3;
    if(theme==='candy'||theme==='rainbow'){
      ctx.fillStyle=ft.flower1;ctx.beginPath();ctx.arc(dx,dy,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(dx,dy,1,0,Math.PI*2);ctx.fill();
    }else if(theme==='ocean'){
      ctx.strokeStyle='rgba(180,220,255,.3)';ctx.lineWidth=.8;
      ctx.beginPath();ctx.arc(dx,dy+Math.sin(af*.05+i)*2,2+Math.sin(i)*1,0,Math.PI*2);ctx.stroke();
    }else if(theme==='toy'){
      ctx.fillStyle=ft.flower2;ctx.save();ctx.translate(dx,dy);ctx.rotate(i*.7);
      ctx.beginPath();for(var j=0;j<4;j++){var a2=j*Math.PI/2;ctx.lineTo(Math.cos(a2)*3,Math.sin(a2)*3);ctx.lineTo(Math.cos(a2+Math.PI/4)*1.2,Math.sin(a2+Math.PI/4)*1.2)}ctx.closePath();ctx.fill();ctx.restore();
    }else if(theme==='space'){
      var twinkle=Math.sin(af*.08+i*1.7)*.5+.5;
      ctx.globalAlpha=.15+twinkle*.25;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(dx,dy,1+twinkle,0,Math.PI*2);ctx.fill();
    }else{
      ctx.fillStyle=ft.grass;ctx.beginPath();ctx.moveTo(dx,dy);ctx.lineTo(dx-2,dy-5);ctx.lineTo(dx+2,dy-5);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // Ground light spots
  ctx.globalAlpha=.05;ctx.fillStyle='#fff';
  for(var i2=0;i2<18;i2++){
    var lx=(i2*180+50)%MAP_W,ly=(i2*120+100)%(MAP_H-80)+60;
    if(lx<vLeft||lx>vRight||ly<vTop||ly>vBottom)continue;
    var lr=40+Math.sin(af*.02+i2)*8;
    ctx.beginPath();ctx.arc(lx,ly,lr,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBG(theme){
  var ft=FLOOR_THEMES[theme]||FLOOR_THEMES.candy;
  var af=Date.now()*.03;
  // Floor gradient over full map
  var g=ctx.createRadialGradient(MAP_W/2,MAP_H/2,100,MAP_W/2,MAP_H/2,1500);
  g.addColorStop(0,ft.base2);g.addColorStop(1,ft.base1);
  ctx.fillStyle=g;ctx.fillRect(0,0,MAP_W,MAP_H);
  // Rounded tiles — only draw visible ones
  var ts=48;
  var tileStartX=Math.floor(camX/ts)*ts;
  var tileStartY=Math.max(50,Math.floor(camY/ts)*ts);
  var tileEndX=Math.min(MAP_W,camX+W+ts);
  var tileEndY=Math.min(MAP_H,camY+H+ts);
  for(var tx=tileStartX;tx<tileEndX;tx+=ts){
    for(var ty=tileStartY;ty<tileEndY;ty+=ts){
      var odd=((tx/ts)+(ty/ts))%2===0;
      ctx.fillStyle=odd?ft.tile1:ft.tile2;
      ctx.beginPath();ctx.roundRect(tx+1,ty+1,ts-2,ts-2,4);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(tx+1,ty+1,ts-2,2);
      ctx.fillRect(tx+1,ty+1,2,ts-2);
    }
  }
  // Tile edge lines
  ctx.strokeStyle=ft.line;ctx.lineWidth=.3;ctx.globalAlpha=.15;
  for(var x=tileStartX;x<tileEndX;x+=ts){ctx.beginPath();ctx.moveTo(x,tileStartY);ctx.lineTo(x,tileEndY);ctx.stroke()}
  for(var y=tileStartY;y<tileEndY;y+=ts){ctx.beginPath();ctx.moveTo(tileStartX,y);ctx.lineTo(tileEndX,y);ctx.stroke()}
  ctx.globalAlpha=1;
  // Ground decorations
  drawGroundDecorations(ctx,theme,ft,af);
  // Paths between obstacles
  ctx.strokeStyle=ft.path;ctx.lineWidth=18;ctx.globalAlpha=.12;ctx.lineCap='round';ctx.lineJoin='round';
  var obs=THEME_OBSTACLES[theme]||[];
  if(obs.length>=2){
    ctx.beginPath();ctx.moveTo(obs[0].x,obs[0].y);
    for(var pi=1;pi<Math.min(obs.length,8);pi++){ctx.lineTo(obs[pi].x,obs[pi].y)}
    ctx.stroke();
    ctx.strokeStyle=ft.pathEdge;ctx.lineWidth=20;ctx.globalAlpha=.06;
    ctx.beginPath();ctx.moveTo(obs[0].x,obs[0].y);
    for(var pi2=1;pi2<Math.min(obs.length,8);pi2++){ctx.lineTo(obs[pi2].x,obs[pi2].y)}
    ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.lineCap='butt';ctx.lineJoin='miter';
  // Scene obstacles — only draw visible ones
  var vLeft=camX-80,vTop=camY-80,vRight=camX+W+80,vBottom=camY+H+80;
  for(var oi=0;oi<obs.length;oi++){
    var ob=obs[oi];
    if(ob.x>vLeft&&ob.x<vRight&&ob.y>vTop&&ob.y<vBottom)
      drawSceneObstacle(ctx,ob.type,ob.x,ob.y,ft,af);
  }
  // Border glow around full map
  ctx.strokeStyle=ft.accent;ctx.lineWidth=3;ctx.globalAlpha=.3;
  ctx.shadowColor=ft.accent;ctx.shadowBlur=10;
  ctx.beginPath();ctx.roundRect(2,48,MAP_W-4,MAP_H-50,12);ctx.stroke();
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  // Vignette (relative to camera view)
  var vcx=camX+W/2,vcy=camY+H/2;
  var vg=ctx.createRadialGradient(vcx,vcy,150,vcx,vcy,500);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.2)');
  ctx.fillStyle=vg;ctx.fillRect(camX,camY,W,H);
  // Rainbow
  if(killed>=5){
    ctx.globalAlpha=.12;var rg=ctx.createLinearGradient(camX+W/4,camY+40,camX+W*3/4,camY+40);
    rg.addColorStop(0,'#ff0000');rg.addColorStop(.17,'#ff8800');rg.addColorStop(.33,'#ffff00');
    rg.addColorStop(.5,'#00ff00');rg.addColorStop(.67,'#0088ff');rg.addColorStop(.83,'#0000ff');rg.addColorStop(1,'#8800ff');
    ctx.strokeStyle=rg;ctx.lineWidth=16;ctx.beginPath();ctx.arc(camX+W/2,camY+60,180,Math.PI*.15,Math.PI*.85);ctx.stroke();ctx.globalAlpha=1;
  }
  // Environment particles — spawn in visible area
  if(envParts.length<40&&Math.random()<.1){
    var ep=theme==='ocean'?{c:'rgba(180,220,255,.4)',r:2+Math.random()*2}
      :theme==='space'?{c:'rgba(255,255,200,.3)',r:1+Math.random()*1.5}
      :theme==='candy'?{c:['rgba(255,100,150,.3)','rgba(255,200,100,.3)','rgba(200,255,100,.3)'][~~(Math.random()*3)],r:2+Math.random()*2}
      :theme==='toy'?{c:'rgba(255,200,100,.25)',r:1.5+Math.random()*2}
      :{c:'rgba(255,180,255,.25)',r:2+Math.random()*2};
    envParts.push({x:camX+Math.random()*W,y:camY+50+Math.random()*(H-60),vx:(Math.random()-.5)*.3,vy:theme==='ocean'?-.3-Math.random()*.3:.15+Math.random()*.15,life:120+~~(Math.random()*60),r:ep.r,c:ep.c});
  }
  for(var ei=envParts.length-1;ei>=0;ei--){
    var e=envParts[ei];e.x+=e.vx;e.y+=e.vy;e.life--;
    if(e.life<=0){envParts.splice(ei,1);continue}
    var ea=e.life>30?1:e.life/30;
    ctx.globalAlpha=ea;ctx.fillStyle=e.c;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ====================================================================
//  PLAYER (top-down, 8-directional)

function Player(id,pColor){this.id=id;this.pColor=pColor;this.pName=id===0?'P1':'P2';this.reset()}
Player.prototype.reset=function(){
  this.x=this.id===0?MAP_W/2-30:MAP_W/2+30;this.y=MAP_H/2;this.w=32;this.h=32;
  this.facing=0;this.spd=3.5;this.dashCd=0;this.dashing=0;
  this.hp=5;this.inv=0;this.cd=0;this.shield=0;
  this.wpIdx=0;this.stars=0;this.grenadeCd=0;this._swLock=false;
};
Player.prototype.applyInput=function(inp){
  var dx=0,dy=0;
  if(inp.lt)dx-=1;if(inp.rt)dx+=1;if(inp.up)dy-=1;if(inp.dn)dy+=1;
  if(dx!==0||dy!==0){
    var len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    this.facing=Math.atan2(dy,dx);
  }
  var sp=this.spd;
  if(this._slowTimer>0)sp*=.45;
  if(this.dashing>0){this.dashing--;sp=8}
  this.x+=dx*sp;this.y+=dy*sp;
  if(this.x<4)this.x=4;if(this.x+this.w>MAP_W-4)this.x=MAP_W-4-this.w;
  if(this.y<50)this.y=50;if(this.y+this.h>MAP_H-4)this.y=MAP_H-4-this.h;
  if(this.inv>0)this.inv--;
  if(this.cd>0)this.cd--;
  if(this.shield>0)this.shield--;
  if(this.grenadeCd>0)this.grenadeCd--;
  if(this.dashCd>0)this.dashCd--;
  var wp=WEAPONS[this.wpIdx];
  if(inp.shoot&&this.cd<=0){
    var cx=this.x+this.w/2,cy=this.y+this.h/2;
    var bx=cx+Math.cos(this.facing)*18;
    var by=cy+Math.sin(this.facing)*18;
    this.cd=wp.cd;wp.fire(bx,by,this.facing,wp.spd);snd(wp.snd);
    boom(bx,by,wp.color,4,{shapes:['circle','star'],spd:3,spdMin:1,sz:3,szMin:1,life:10,lifeMin:5,vy:0,rotSpd:.5});
    boom(bx,by,'#fff',2,{shape:'circle',spd:2,sz:2,life:6,vy:0});
  }
  if(inp.grn&&this.grenadeCd<=0){
    this.grenadeCd=40;
    grenades.push(new Grenade(this.x+this.w/2,this.y+this.h/2,Math.cos(this.facing)*5,Math.sin(this.facing)*5,this));
    snd('grenade');
  }
  if(inp.sw&&!this._swLock){this._swLock=true;this.wpIdx=(this.wpIdx+1)%WEAPONS.length;snd('switch');
    floatTxt(this.x,this.y-20,WEAPONS[this.wpIdx].icon+' '+WEAPONS[this.wpIdx].name,'#ffcc00',14)}
  if(!inp.sw)this._swLock=false;
  if(inp.jmp&&this.dashCd<=0){this.dashCd=50;this.dashing=8;snd('shoot')}
};
Player.prototype.draw=function(){

  var cx=this.x+this.w/2,cy=this.y+this.h/2;

  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(cx+1,cy+15,20,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.06)';ctx.beginPath();ctx.ellipse(cx+1,cy+17,24,12,0,0,Math.PI*2);ctx.fill();

  if(this.shield>0){
    ctx.strokeStyle='rgba(100,220,255,.5)';ctx.lineWidth=3;ctx.shadowColor='#88ddff';ctx.shadowBlur=15;

  ctx.fillStyle=eggG;ctx.beginPath();ctx.ellipse(cx,cy+bob,16,18,0,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.ellipse(cx,cy+bob,16,18,0,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  // Highlight shine
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(cx-5,cy-8+bob,5,6,-.3,0,Math.PI*2);ctx.fill();
  // Hat (cute beanie)
  ctx.fillStyle=hatC;
  ctx.beginPath();ctx.ellipse(cx,cy-16+bob,13,8,0,Math.PI,0);ctx.fill();
  ctx.fillStyle=hatC;ctx.beginPath();ctx.roundRect(cx-13,cy-20+bob,26,8,4);ctx.fill();
  // Hat pom-pom
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy-22+bob,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(cx-1,cy-23+bob,2,0,Math.PI*2);ctx.fill();
  // Hat stripe
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(cx-12,cy-17+bob,24,3);
  // Scarf (围巾)
  ctx.fillStyle=scarfC;
  ctx.beginPath();ctx.ellipse(cx,cy-2+bob,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=scarfC;ctx.save();ctx.translate(cx+12,cy+bob);ctx.rotate(Math.sin(af*.08)*.2);
  ctx.beginPath();ctx.roundRect(0,-2,8,16,3);ctx.fill();ctx.restore();
  // Little feet with shoes
  ctx.fillStyle=eggC;
  ctx.beginPath();ctx.ellipse(cx-6,cy+16+bob,5,4,.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+6,cy+16+bob,5,4,-.1,0,Math.PI*2);ctx.fill();
  // Shoes (little round shoes)

  // Tiny arms with mittens

  ctx.beginPath();ctx.ellipse(cx+Math.cos(armAng-.9)*16,cy+Math.sin(armAng-.9)*16+bob,4,5,armAng,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+Math.cos(armAng+.9)*16,cy+Math.sin(armAng+.9)*16+bob,4,5,armAng,0,Math.PI*2);ctx.fill();

  // Eyes (big cute eyes with gradient iris)

  var irisG=ctx.createRadialGradient(cx-5+Math.cos(eyeTracking)*2+eyeOff,cy-3+Math.sin(eyeTracking)*2+bob,0,cx-5+Math.cos(eyeTracking)*2+eyeOff,cy-3+Math.sin(eyeTracking)*2+bob,3);
  irisG.addColorStop(0,isBlue?'#2255aa':'#aa3322');irisG.addColorStop(1,isBlue?'#113366':'#662211');
  ctx.fillStyle=irisG;ctx.beginPath();ctx.arc(cx-5+Math.cos(eyeTracking)*2+eyeOff,cy-3+Math.sin(eyeTracking)*2+bob,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-4+Math.cos(eyeTracking)*2+eyeOff,cy-4.5+Math.sin(eyeTracking)*2+bob,1.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(cx-6+Math.cos(eyeTracking)*1+eyeOff,cy-2+Math.sin(eyeTracking)*1+bob,.7,0,Math.PI*2);ctx.fill();
  // Right eye
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(cx+6+eyeOff,cy-4+bob,5.5,6,0,0,Math.PI*2);ctx.fill();
  var irisG2=ctx.createRadialGradient(cx+7+Math.cos(eyeTracking)*2+eyeOff,cy-3+Math.sin(eyeTracking)*2+bob,0,cx+7+Math.cos(eyeTracking)*2+eyeOff,cy-3+Math.sin(eyeTracking)*2+bob,3);
  irisG2.addColorStop(0,isBlue?'#2255aa':'#aa3322');irisG2.addColorStop(1,isBlue?'#113366':'#662211');
  ctx.fillStyle=irisG2;ctx.beginPath();ctx.arc(cx+7+Math.cos(eyeTracking)*2+eyeOff,cy-3+Math.sin(eyeTracking)*2+bob,3,0,Math.PI*2);ctx.fill();

// Helper: shade a hex color
function shadeColor(c,pct){
  var n=parseInt(c.replace('#',''),16);var r=(n>>16)+pct;var g=((n>>8)&0xff)+pct;var b=(n&0xff)+pct;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

  }
};

  ctx.lineTo(cx+16,cy-34+bob);ctx.closePath();ctx.fill();
  // Crown highlight
  ctx.fillStyle='rgba(255,255,200,.3)';ctx.fillRect(cx-16,cy-42+bob,30,4);
  // Crown gems (with glow)
  var gemColors=['#ff4444','#44ff44','#4444ff'];
  for(var gi=0;gi<3;gi++){
    var gx2=cx+[-14,2,14][gi],gy2=cy+[-48,-50,-48][gi]+bob;

    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(gx2-1,gy2-1,1.5,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='rgba(255,'+(phase===3?'100':'130')+',130,.3)';ctx.beginPath();ctx.ellipse(cx-20,cy+4+bob,7,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+22,cy+4+bob,7,3.5,0,0,Math.PI*2);ctx.fill();
  // Mouth (changes with phase)
  if(phase===1){
    ctx.fillStyle='#448844';ctx.beginPath();ctx.arc(cx+1,cy+12+bob,10,.1*Math.PI,.9*Math.PI);ctx.fill();
    ctx.fillStyle='#fff';for(var i=-3;i<=3;i++){ctx.fillRect(cx+i*3-1,cy+12+bob,2,4)}
  }else if(phase===2){
    ctx.fillStyle='#886622';ctx.beginPath();ctx.arc(cx+1,cy+12+bob,12,.05*Math.PI,.95*Math.PI);ctx.fill();
    ctx.fillStyle='#fff';for(var i2=-4;i2<=4;i2++){ctx.fillRect(cx+i2*3-1,cy+12+bob,2.5,5)}
    // Drool/steam

  }else{
    ctx.fillStyle='#883322';ctx.beginPath();ctx.arc(cx+1,cy+12+bob,14,.05*Math.PI,.95*Math.PI);ctx.fill();
    ctx.fillStyle='#ff6644';ctx.beginPath();ctx.arc(cx+1,cy+14+bob,10,.1*Math.PI,.9*Math.PI);ctx.fill();
    ctx.fillStyle='#fff';for(var i3=-4;i3<=4;i3++){ctx.fillRect(cx+i3*3.5-1,cy+12+bob,2.5,5.5)}

  ctx.beginPath();ctx.ellipse(0,0,9,15,0,0,Math.PI*2);ctx.fill();

var bullets=[];
function Bullet(x,y,dx,dy,w,h,c,exp){this.x=x;this.y=y;this.dx=dx;this.dy=dy;this.alive=true;this.w=w||10;this.h=h||10;this.r=this.w/2;this.c=c||'#33ff66';this.exp=exp||false}
Bullet.prototype.update=function(){this.x+=this.dx;this.y+=this.dy;if(this.x<-20||this.x>MAP_W+20||this.y<-20||this.y>MAP_H+20){if(this.exp)this.explode();this.alive=false}};
Bullet.prototype.explode=function(){
  snd('explode');
  boom(this.x,this.y,'#fff',6,{shape:'circle',spd:6,sz:5,life:10,vy:-2});
  boom(this.x,this.y,'#ff8800',12,{shapes:['circle','star'],spd:5,spdMin:1,sz:6,life:22,vy:-2,rotSpd:.3});
  boom(this.x,this.y,'#ffcc00',8,{shape:'star',spd:4,sz:5,life:25,vy:-3,rotSpd:.3});
  boom(this.x,this.y,'#ff6600',6,{shape:'ring',spd:2,sz:12,life:18,vy:0});
  shakeAmt=6;screenFlash=3;
  for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];if(!e.alive)continue;var dxa=e.x+e.w/2-this.x,dya=e.y+e.h/2-this.y;if(Math.sqrt(dxa*dxa+dya*dya)<60){e.hp-=2;if(e.hp<=0)killEnemy(e,i)}}
  if(boss&&boss.alive){var dxb=boss.x+40-this.x,dyb=boss.y+40-this.y;if(Math.sqrt(dxb*dxb+dyb*dyb)<60){if(boss.hurt(2)){score+=200;killed++;boss=null;shakeAmt=12;screenFlash=10;if(killed>=lc.toKill){var cm=lc.clearLine.replace(/\{n\}/g,playerName||'北北');setTimeout(function(){showStory(cm,'clear-line',nextLvl)},1200)}}}}
};
Bullet.prototype.draw=function(){
  // Trail
  ctx.globalAlpha=.3;ctx.fillStyle=this.c;
  ctx.beginPath();ctx.arc(this.x-this.dx*.6,this.y-this.dy*.6,this.r*.7,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.15;
  ctx.beginPath();ctx.arc(this.x-this.dx*1.2,this.y-this.dy*1.2,this.r*.4,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Main bullet with glow
  ctx.fillStyle=this.c;ctx.shadowColor=this.c;ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
  // Inner bright core
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(this.x,this.y,this.r*.4,0,Math.PI*2);ctx.fill();
  if(this.exp){ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(this.x,this.y,this.r*.5,0,Math.PI*2);ctx.fill()}
  ctx.shadowBlur=0;
};

var powerups=[];
function Powerup(x,y,type){this.x=x;this.y=y;this.type=type;this.w=24;this.h=24;this.alive=true;this.af=0}
Powerup.prototype.update=function(){this.af++};
Powerup.prototype.draw=function(){
  var bob=Math.sin(this.af*.08)*3;ctx.save();ctx.translate(this.x+12,this.y+12+bob);
  // Pulsing glow
  var pulse=.8+Math.sin(this.af*.12)*.2;
  var isUp=this.type==='upgrade';
  ctx.globalAlpha=.15*pulse;ctx.fillStyle=isUp?'#ff88cc':'#88ccff';
  ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.rotate(this.af*.02);
  // Capsule body with gradient
  var pG=ctx.createRadialGradient(-2,-2,0,0,0,12);
  if(isUp){pG.addColorStop(0,'#ffaadd');pG.addColorStop(1,'#dd5599')}
  else{pG.addColorStop(0,'#aaddff');pG.addColorStop(1,'#5599dd')}
  ctx.fillStyle=pG;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
  // Inner ring
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.stroke();
  // Icon
  ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(isUp?'W':'盾',0,1);ctx.textAlign='left';ctx.textBaseline='alphabetic';
  // Shine
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(-3,-4,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
};

var players=[],score,level,lc,spawnT,killed,totalKilled=0;
var gameOn=false,gameEnd=false,combo,comboTimer;
var hitStop=0,screenFlash=0,shakeAmt=0,loopRunning=false;
var continueTimer=null,continueActive=false;
var twoPlayerMode=false;

function nearestPlayer(x,y){
  var best=players[0],bd=99999;
  for(var i=0;i<players.length;i++){var d=Math.abs(players[i].x-x)+Math.abs(players[i].y-y);if(d<bd){bd=d;best=players[i]}}
  return best;
}
function minPlayerDist(x,y){var d=9999;for(var i=0;i<players.length;i++){var dd=Math.sqrt((x-players[i].x)*(x-players[i].x)+(y-players[i].y)*(y-players[i].y));if(dd<d)d=dd}return d}
function allPlayersDead(){for(var i=0;i<players.length;i++){if(players[i].hp>0)return false}return true}

function killEnemy(e,idx){
  e.alive=false;combo++;comboTimer=180;totalKilled++;
  var mul=combo>=10?5:combo>=5?3:combo>=3?2:1;
  var pts=10*mul;score+=pts;killed++;
  floatTxt(e.x,e.y-10,'+'+pts,mul>1?'#ffcc00':'#fff');
  if(mul>=2)floatTxt(e.x,e.y-30,comboMsg(),'#ff88cc')
  if(combo>=3)snd('combo');if(combo>=5)showBadge('combo5','连击达人！');
  if(totalKilled===1)showBadge('firstKill','初次战斗！');
  // Dramatic death explosion
  enemyDeathBoom(e.x,e.y,e.type,e.color);
  shakeAmt=e.type==='heavy'?6:4;screenFlash=3;
  if(Math.random()<.3)collectibles.push(new Collect(e.x,e.y,'star'));
  else if(Math.random()<.25)collectibles.push(new Collect(e.x,e.y,'candy'));
  else if(Math.random()<.12)collectibles.push(new Collect(e.x,e.y,'gift'));
  if(Math.random()<.12)powerups.push(new Powerup(e.x,e.y,'upgrade'));
  if(Math.random()<.35)floatTxt(e.x+10,e.y-40,cheer(),'#88ffcc',13);
  if(idx!==undefined)enemies.splice(idx,1);
}

function spawnSceneObjects(lvl){
  var bg=LEVELS[lvl].bg;
  // Spawn destructibles
  var dtypes=THEME_DESTRUCTIBLES[bg]||['candyJar','cookieWall'];
  for(var i=0;i<12;i++){
    var t=dtypes[i%dtypes.length];
    var x=100+Math.random()*(MAP_W-200);
    var y=80+Math.random()*(MAP_H-160);
    destructibles.push(new Destructible(x,y,t));
  }
  // Spawn hazards
  var htype=THEME_HAZARDS[bg]||'chocolate';
  for(var i=0;i<5;i++){
    var x=150+Math.random()*(MAP_W-300);
    var y=100+Math.random()*(MAP_H-200);
    var h=new Hazard(x,y,htype);
    // For portals, create linked pair
    if(htype==='portal'&&i%2===0&&i+1<5){
      var h2=new Hazard(x+200+Math.random()*300,y+Math.random()*200,htype);
      h.linkX=h2.x+h2.w/2;h.linkY=h2.y+h2.h/2;
      h2.linkX=h.x+h.w/2;h2.linkY=h.y+h.h/2;
      hazards.push(h);hazards.push(h2);i++;
    }else{
      hazards.push(h);
    }
  }
}

function initGame(){
  twoPlayerMode=(netMode==='local'||netMode==='host'||netMode==='guest');
  players=[new Player(0,'blue')];
  players[0].pName=playerName||'北北';
  if(twoPlayerMode){players.push(new Player(1,'red'));players[1].pName='P2'}
  bullets=[];enemies=[];eBullets=[];powerups=[];collectibles=[];
  parts=[];floats=[];grenades=[];destructibles=[];hazards=[];
  score=0;level=0;lc=LEVELS[0];spawnT=0;killed=0;totalKilled=0;
  spawnSceneObjects(0);
  gameOn=true;gameEnd=false;boss=null;bossSpawned=false;combo=0;comboTimer=0;
  hitStop=0;screenFlash=0;shakeAmt=0;continueActive=false;continueCount=0;
  badges={firstKill:false,level1:false,combo5:false,collector:false,neverGiveUp:false};
  if(continueTimer){clearInterval(continueTimer);continueTimer=null}
  // pet.x=MAP_W/2-30;pet.y=MAP_H/2;pet.shootCd=0; // 宠物已移除
  guestInput={};
}

  storyTyping=true;
  storyHint.textContent='点击继续';
  // Pause game while story is showing
  var wasGameOn=gameOn;
  gameOn=false;
  // Typewriter effect
  var i=0;var full=text;
  storyText.innerHTML='';
  var span=document.createElement('span');
  if(cls)span.className=cls;
  storyText.appendChild(span);
  storyTimer=setInterval(function(){
    if(i<full.length){span.textContent+=full[i];i++}
    else{storyTyping=false;clearInterval(storyTimer);storyTimer=null}
  },40);
  // Store pause state for resume
  storyBox._wasGameOn=wasGameOn;
}

function closeStory(){
  if(storyTyping){
    // Skip typewriter, show full text
    clearInterval(storyTimer);storyTimer=null;storyTyping=false;
    var span=storyText.querySelector('span');
    if(span){span.textContent=span.getAttribute('data-full')||span.textContent}
    // Just show all text at once
    return;
  }
  storyBox.classList.add('hidden');
  storyBox.style.pointerEvents='none';
  // Resume game after story closes
  if(storyBox._wasGameOn){
    gameOn=true;
    if(!loopRunning){loopRunning=true;loop()}
  }
  if(storyCallback){var cb=storyCallback;storyCallback=null;cb()}
}

storyBox.addEventListener('click',function(){closeStory()});
storyBox.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();closeStory();},{passive:false});
document.addEventListener('keydown',function(e){
  if(!storyBox.classList.contains('hidden')&&(e.code==='Space'||e.code==='Enter'||e.code==='KeyJ')){
    e.preventDefault();closeStory();
  }
});

function doContinue(){
