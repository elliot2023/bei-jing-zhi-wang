function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

// ====================================================================
//  MAIN LOOP
// ====================================================================
function loop(){
  if(!gameOn){requestAnimationFrame(loop);return}
  try{if(hitStop>0){hitStop--;requestAnimationFrame(loop);return}
    if(netMode==='host'){update();draw();sendState()}
    else if(netMode==='guest'){
      sendInput();
      // Apply local input to guest's own player for responsiveness
      if(players.length>1){var gi={lt:!!keys.ArrowLeft,rt:!!keys.ArrowRight,up:!!keys.ArrowUp,dn:!!keys.ArrowDown,jmp:false,shoot:!!keys.KeyL,grn:!!keys.Semicolon,sw:!!keys.Slash};players[1].applyInput(gi)}
      // Camera follow guest's own player
      if(players.length>1){var gp=players[1];var gx=gp.x+gp.w/2-W/2;var gy=gp.y+gp.h/2-H/2;camX+=(gx-camX)*.1;camY+=(gy-camY)*.1;camX=Math.max(0,Math.min(MAP_W-W,camX));camY=Math.max(0,Math.min(MAP_H-H,camY))}
      draw();
    }
    else{update();draw()}
  }catch(e){console.error(e)}
  requestAnimationFrame(loop);
}

// ====================================================================
//  NETWORK STATE SYNC
// ====================================================================
function serializePlayer(p){return[p.x,p.y,p.hp,p.facing,p.wpIdx,p.stars,0,p.inv,p.shield,p.grenadeCd]}
function serializeEnemy(e){return[e.x,e.y,e.type,e.hp,e.alive?1:0]}
function serializeBullet(b){return[b.x,b.y,b.dx,b.dy,b.w,b.h,b.c]}
function serializeCollect(c){return[c.x,c.y,c.type,c.alive?1:0]}
function serializePowerup(p){return[p.x,p.y,p.type,p.alive?1:0]}

function sendState(){
  var d={
    p:players.map(serializePlayer),
    e:enemies.map(serializeEnemy),
    b:bullets.map(serializeBullet),
    eb:eBullets.map(function(b){return[b.x,b.y,b.dx,b.dy]}),
    g:grenades.map(function(g){return[g.x,g.y,g.dx,g.dy,g.life]}),
    c:collectibles.map(serializeCollect),
    pu:powerups.map(serializePowerup),
    boss:boss&&boss.alive?[boss.x,boss.y,boss.hp,boss.maxHP]:null,
    score:score,level:level,killed:killed,totalKilled:totalKilled,
    combo:combo,bossSpawned:bossSpawned,
    bgOff:bgOff,shakeAmt:shakeAmt,screenFlash:screenFlash,
    petX:pet.x,petY:pet.y
  };
  sendMsg({type:'state',d:d});
}

function applyGameState(d){
  // Players
  if(d.p){
    while(players.length<d.p.length)players.push(new Player(players.length,players.length===0?'blue':'red'));
    while(players.length>d.p.length)players.pop();
    for(var i=0;i<d.p.length;i++){
      var pd=d.p[i],p=players[i];
      p.x=pd[0];p.y=pd[1];p.hp=pd[2];p.facing=pd[3];p.wpIdx=pd[4];p.stars=pd[5];
      p.inv=pd[7];p.shield=pd[8];p.grenadeCd=pd[9];
    }
  }
  // Enemies
  enemies=[];
  if(d.e)for(var i=0;i<d.e.length;i++){var ed=d.e[i];
    var en=new Enemy(ed[0],0.9,ed[2]);en.y=ed[1];en.hp=ed[3];en.alive=ed[4]===1;en.af=~~(Date.now()/50);enemies.push(en)}
  // Bullets
  bullets=[];
  if(d.b)for(var i=0;i<d.b.length;i++){var bd=d.b[i];var bb=new Bullet(bd[0],bd[1],bd[2],bd[3],bd[4],bd[5],bd[6]);bullets.push(bb)}
  // Enemy bullets
  eBullets=[];
  if(d.eb)for(var i=0;i<d.eb.length;i++){var ed=d.eb[i];eBullets.push(new EBullet(ed[0],ed[1],ed[2],ed[3]))}
  // Grenades
  grenades=[];
  if(d.g)for(var i=0;i<d.g.length;i++){var gd=d.g[i];var gr=new Grenade(gd[0],gd[1],gd[2],gd[3],null);gr.life=gd[4];grenades.push(gr)}
  // Collectibles
  collectibles=[];
  if(d.c)for(var i=0;i<d.c.length;i++){var cd=d.c[i];var cc=new Collect(cd[0],cd[1],cd[2]);cc.alive=cd[3]===1;collectibles.push(cc)}
  // Powerups
  powerups=[];
  if(d.pu)for(var i=0;i<d.pu.length;i++){var pd=d.pu[i];var pp=new Powerup(pd[0],pd[1],pd[2]);pp.alive=pd[3]===1;powerups.push(pp)}
  // Boss
  if(d.boss){if(!boss||!boss.alive)boss=new Boss(d.boss[0],d.boss[3]);boss.x=d.boss[0];boss.y=d.boss[1];boss.hp=d.boss[2];boss.alive=true;bossSpawned=true}
  else{boss=null}
  // State
  score=d.score;level=d.level;killed=d.killed;totalKilled=d.totalKilled;
  combo=d.combo;bossSpawned=d.bossSpawned;lc=LEVELS[level]||LEVELS[0];
  bgOff=d.bgOff||0;shakeAmt=d.shakeAmt||0;screenFlash=d.screenFlash||0;
  if(d.petX!==undefined){pet.x=d.petX;pet.y=d.petY}
}

function sendInput(){
  var inp={
    lt:!!keys.ArrowLeft,rt:!!keys.ArrowRight,up:!!keys.ArrowUp,dn:!!keys.ArrowDown,
    jmp:false,shoot:!!keys.KeyL,grn:!!keys.Semicolon,sw:!!keys.Slash
  };
  sendMsg({type:'input',d:inp});
}

function applyGuestInput(inp){
  if(players.length>1)players[1].applyInput(inp);
}

function update(){
  // P1 local input (top-down: WASD + Space dash)
  var p1inp={lt:!!keys.KeyA,rt:!!keys.KeyD,up:!!keys.KeyW,dn:!!keys.KeyS,jmp:!!keys.Space,shoot:!!keys.KeyJ,grn:!!keys.KeyK,sw:!!keys.KeyQ};
  players[0].applyInput(p1inp);
  // P2 local input
  if(netMode==='local'&&players.length>1){
    var p2inp={lt:!!keys.ArrowLeft,rt:!!keys.ArrowRight,up:!!keys.ArrowUp,dn:!!keys.ArrowDown,jmp:false,shoot:!!keys.KeyL,grn:!!keys.Semicolon,sw:!!keys.Slash};
    players[1].applyInput(p2inp);
  }
  if(netMode==='host'&&guestInput)applyGuestInput(guestInput);

  bgOff+=.4;
  // Camera follow player (smooth)
  var pc=netMode==='guest'&&players.length>1?players[1]:players[0];
  var tcx=pc.x+pc.w/2-W/2;
  var tcy=pc.y+pc.h/2-H/2;
  camX+=(tcx-camX)*.1;camY+=(tcy-camY)*.1;
  camX=Math.max(0,Math.min(MAP_W-W,camX));
  camY=Math.max(0,Math.min(MAP_H-H,camY));
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0}

  var i,b;
  for(i=bullets.length-1;i>=0;i--){bullets[i].update();if(!bullets[i].alive)bullets.splice(i,1)}
  for(i=eBullets.length-1;i>=0;i--){eBullets[i].update();if(!eBullets[i].alive)eBullets.splice(i,1)}
  for(i=grenades.length-1;i>=0;i--){grenades[i].update();if(!grenades[i].alive)grenades.splice(i,1)}

  // Spawn enemies around the player (outside visible area but reachable)
  spawnT++;var si=lc.spawn/16.67;
  if(!bossSpawned&&spawnT>=si&&enemies.length<lc.maxE){
    spawnT=0;
    var pc=players[0];
    var ang=Math.random()*Math.PI*2;
    var dist=250+Math.random()*200; // spawn 250-450px from player (visible edge)
    var ex=pc.x+pc.w/2+Math.cos(ang)*dist;
    var ey=pc.y+pc.h/2+Math.sin(ang)*dist;
    // clamp to map bounds
    ex=Math.max(-30,Math.min(MAP_W+30,ex));
    ey=Math.max(-30,Math.min(MAP_H+30,ey));
    if(minPlayerDist(ex,ey)>=120){
      var r=Math.random(),type='monster';
      if(level>=1&&r>.72)type='heavy';if(level>=2&&r>.82)type='jumper';if(level>=3&&r>.86)type='shooter';
      var spd=type==='heavy'?lc.eSpd*.6:lc.eSpd;
      enemies.push(new Enemy(ex,ey,spd,type));
    }
  }

  if(!bossSpawned&&killed>=lc.toKill){
    bossSpawned=true;enemies=[];eBullets=[];
    boss=new Boss(MAP_W/2-35,MAP_H/3,lc.bossHP);snd('boss');
    showStory(lc.bossLine,'boss-line');
  }
  if(boss&&boss.alive)boss.update();

  var e;
  for(i=enemies.length-1;i>=0;i--){
    e=enemies[i];var nearP=nearestPlayer(e.x,e.y);e.update(nearP.x+nearP.w/2,nearP.y+nearP.h/2);
    for(var p=0;p<players.length;p++){
      if(e.alive&&rc(players[p],e)){if(players[p].hurt()){e.alive=false;if(allPlayersDead()){showEnd(false);return}enemies=[];eBullets=[]}}
    }
    if(e.type==='shooter'&&e.alive){e.shootTimer--;if(e.shootTimer<=0){e.shootTimer=~~(Math.random()*120+80);
      var sp=nearestPlayer(e.x,e.y);var a=Math.atan2(sp.y-e.y,sp.x-e.x);eBullets.push(new EBullet(e.x+e.w/2,e.y+e.h/2,Math.cos(a)*2.5,Math.sin(a)*2.5))}}
    if(!e.alive)enemies.splice(i,1);
  }

  for(i=eBullets.length-1;i>=0;i--){
    b=eBullets[i];for(var p=0;p<players.length;p++){if(b.alive&&rc(players[p],b)){b.alive=false;bulletSpark(b.x,b.y,'#ff4466');if(players[p].hurt()){if(allPlayersDead()){showEnd(false);return}enemies=[];eBullets=[]}}}
    if(!b.alive)eBullets.splice(i,1);
  }

  for(i=bullets.length-1;i>=0;i--){
    b=bullets[i];if(!b.alive){bullets.splice(i,1);continue}
    // bullet x,y is center; convert to top-left for rc()
    var bx=b.x-b.r,by=b.y-b.r,bw=b.w||b.r*2,bh=b.h||b.r*2;
    var hitS=false;
    for(var j=enemies.length-1;j>=0;j--){
      e=enemies[j];if(!e.alive)continue;
      if(bx<e.x+e.w&&bx+bw>e.x&&by<e.y+e.h&&by+bh>e.y){b.alive=false;hitS=true;e.hp--;e.hitTime=e.af;if(e.hp<=0)killEnemy(e,j);else{bulletSpark(b.x,b.y,'#ffaa00');floatTxt(e.x,e.y,'HIT','#ffaa44',12)}snd('hit');break}
    }
    if(!hitS&&boss&&boss.alive&&(bx<boss.x+boss.w&&bx+bw>boss.x&&by<boss.y+boss.h&&by+bh>boss.y)){
      b.alive=false;bulletSpark(b.x,b.y,'#ffaa00');
      if(boss.hurt(1)){score+=200;killed++;boss=null;
        confetti(boss?boss.x+35:MAP_W/2,boss?boss.y+35:MAP_H/2,60);
        boom(MAP_W/2,MAP_H/2,'#ffcc00',20,{shape:'star',spd:8,sz:8,life:35,vy:-3,rotSpd:.3});
        boom(MAP_W/2,MAP_H/2,'#fff',12,{shape:'ring',spd:5,sz:14,life:25,vy:0});
        floatTxt(MAP_W/2-60,MAP_H/2,'太棒了'+(playerName||'北北')+'！+200','#ffcc00',22);shakeAmt=12;screenFlash=10;
        if(killed>=lc.toKill){var clearMsg=lc.clearLine.replace(/\{n\}/g,playerName||'北北');
        setTimeout(function(){showStory(clearMsg,'clear-line',nextLvl)},1200)}}
      else{shakeAmt=3;boom(b.x,b.y,'#ff6600',4,{shape:'circle',spd:2,sz:3,life:10})}snd('hit');
    }
    // Bullet vs Destructible
    if(b.alive){for(var j=destructibles.length-1;j>=0;j--){
      var d=destructibles[j];if(!d.alive)continue;
      if(bx<d.x+d.w&&bx+bw>d.x&&by<d.y+d.h&&by+bh>d.y){b.alive=false;d.hurt(1);snd('hit');break}
    }}
    if(!b.alive)bullets.splice(i,1);
  }

  for(var p=0;p<players.length;p++){if(boss&&boss.alive&&rc(players[p],boss)){if(players[p].hurt()){if(allPlayersDead()){showEnd(false);return}enemies=[];eBullets=[]}}}

  for(i=collectibles.length-1;i>=0;i--){
    var c=collectibles[i];c.update();
    for(var p=0;p<players.length;p++){
      if(c.alive&&rc(players[p],c)){
        c.alive=false;boom(c.x+10,c.y+10,'#ffffff',8);
        if(c.type==='star'){players[p].stars++;score+=5;snd('star');floatTxt(c.x,c.y,'★ '+players[p].stars+'/10','#ffcc00');if(players[p].stars>=10){players[p].stars=0;players[p].hp=Math.min(players[p].hp+1,99);floatTxt(c.x,c.y-20,'+1 命！','#ff4444',18);snd('life');showBadge('collector','收集控！')}}
        else if(c.type==='candy'){score+=50;snd('candy');floatTxt(c.x,c.y,'+50 糖果！','#ff4488')}
        else{var gr=Math.random();if(gr<.33){players[p].hp=Math.min(players[p].hp+3,99);floatTxt(c.x,c.y,'满血！','#ff4444',18);snd('life')}
          else if(gr<.66){players[p].shield=300;floatTxt(c.x,c.y,'护盾5秒！','#88ccff',16);snd('upgrade')}
          else{for(var k=0;k<enemies.length;k++)boom(enemies[k].x+14,enemies[k].y+14,'#ffcc00',10);enemies=[];floatTxt(c.x,c.y,'全屏清怪！','#ffcc00',18);shakeAmt=8;snd('boss')}}
      }
    }
    if(!c.alive)collectibles.splice(i,1);
  }

  for(i=powerups.length-1;i>=0;i--){
    var p2=powerups[i];p2.update();
    for(var p=0;p<players.length;p++){
      if(p2.alive&&rc(players[p],p2)){
        p2.alive=false;snd('upgrade');
        if(p2.type==='upgrade'){players[p].wpIdx=Math.min(players[p].wpIdx+1,WEAPONS.length-1);floatTxt(p2.x,p2.y,WEAPONS[players[p].wpIdx].icon+' '+WEAPONS[players[p].wpIdx].name+'!','#ff88cc',14)}
        else{players[p].shield=300;floatTxt(p2.x,p2.y,'护盾！','#88ccff')}
        boom(p2.x+12,p2.y+12,'#ffffff',10);
      }
    }
    if(!p2.alive)powerups.splice(i,1);
  }

  // Player vs Hazard collision
  for(i=hazards.length-1;i>=0;i--){
    var h=hazards[i];if(!h.active)continue;
    for(var p=0;p<players.length;p++){
      var pl=players[p];
      if(!rc(pl,h))continue;
      if(h.type==='chocolate'){
        // Slow player
        pl._slowTimer=30;
      }else if(h.type==='jellyfish'){
        // Damage with cooldown
        if(!h._cd||h._cd<=0){pl.hurt();h._cd=60;snd('hurt');boom(pl.x+pl.w/2,pl.y+pl.h/2,'#cc88ff',6)}
      }else if(h.type==='spring'){
        // Bounce player upward
        if(!pl._springLock||pl._springLock<=0){
          pl.vy=-12;pl._springLock=40;snd('jump');
          boom(h.x+h.w/2,h.y,'#44cc44',8,{shape:'circle',spd:4,sz:3,life:15});
          floatTxt(h.x,h.y-20,'弹飞！','#44cc44',14);
        }
      }else if(h.type==='blackhole'){
        // Attract player toward center
        var dx2=h.x+h.w/2-pl.x-pl.w/2,dy2=h.y+h.h/2-pl.y-pl.h/2;
        var dist=Math.sqrt(dx2*dx2+dy2*dy2);
        if(dist>5){pl.x+=dx2/dist*1.5;pl.y+=dy2/dist*1.5}
      }else if(h.type==='portal'){
        // Teleport to a random portal
        if(!h._cd||h._cd<=0){
          var others=[];for(var q=0;q<hazards.length;q++){if(hazards[q].type==='portal'&&hazards[q]!==h)others.push(hazards[q])}
          if(others.length>0){
            var target=others[~~(Math.random()*others.length)];
            pl.x=target.x;pl.y=target.y-pl.h;h._cd=90;target._cd=90;
            snd('teleport');boom(target.x+target.w/2,target.y+target.h/2,'#44ddff',10);
            floatTxt(target.x,target.y-20,'传送！','#44ddff',16);
          }
        }
      }
    }
    // Update cooldowns
    if(h._cd&&h._cd>0)h._cd--;
    if(h._jellyPeriod!==undefined){h._jellyPeriod++;if(h._jellyPeriod>=(hazards[i].type==='jellyfish'?120:0))h._jellyPeriod=0}
  }
  // Apply slow effect
  for(var p=0;p<players.length;p++){if(players[p]._slowTimer&&players[p]._slowTimer>0)players[p]._slowTimer--;if(players[p]._springLock&&players[p]._springLock>0)players[p]._springLock--}

  // Cleanup dead destructibles
  destructibles=destructibles.filter(function(d){return d.alive});

  // updatePet(); // 宠物已移除
  for(i=parts.length-1;i>=0;i--){parts[i].update();if(parts[i].life<=0)parts.splice(i,1)}
  for(i=floats.length-1;i>=0;i--){floats[i].update();if(floats[i].life<=0)floats.splice(i,1)}
  if(shakeAmt>0)shakeAmt--;if(screenFlash>0)screenFlash--;
}

function draw(){
  ctx.save();
  if(shakeAmt>0)ctx.translate((Math.random()-.5)*shakeAmt*1.5,(Math.random()-.5)*shakeAmt*1.5);
  // Camera transform — world coordinates
  ctx.translate(-camX,-camY);
  drawBG(lc.bg);
  var i;
  for(i=0;i<hazards.length;i++)hazards[i].draw();
  for(i=0;i<destructibles.length;i++)destructibles[i].draw();
  for(i=0;i<collectibles.length;i++)collectibles[i].draw();
  for(i=0;i<powerups.length;i++)powerups[i].draw();
  for(i=0;i<enemies.length;i++)enemies[i].draw();
  if(boss&&boss.alive)boss.draw();
  for(i=0;i<bullets.length;i++)bullets[i].draw();
  for(i=0;i<eBullets.length;i++)eBullets[i].draw();
  for(i=0;i<grenades.length;i++)grenades[i].draw();
  for(i=0;i<players.length;i++)players[i].draw();
  // drawPet(); // 宠物已移除
  for(i=0;i<parts.length;i++)parts[i].draw();
  for(i=0;i<floats.length;i++)floats[i].draw();
  if(screenFlash>0){ctx.fillStyle=screenFlash>4?'rgba(255,100,150,.1)':'rgba(255,200,100,.06)';ctx.fillRect(camX,camY,W,H)}
  ctx.restore();
  // HUD — fixed on screen (no camera offset)
  drawHUD();
  // Minimap
  drawMinimap();
}

function drawHUD(){
  // HUD glass background
  var bg=ctx.createLinearGradient(0,0,W,0);
  bg.addColorStop(0,'rgba(15,8,25,.82)');bg.addColorStop(.3,'rgba(15,8,25,.7)');bg.addColorStop(.7,'rgba(15,8,25,.7)');bg.addColorStop(1,'rgba(15,8,25,.82)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(0,0,W,46,[0,0,10,10]);ctx.fill();
  // Top highlight line
  ctx.strokeStyle='rgba(255,200,255,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,1);ctx.lineTo(W,1);ctx.stroke();
  // Bottom edge glow
  var bG=ctx.createLinearGradient(0,44,W,44);
  bG.addColorStop(0,'rgba(255,136,204,.15)');bG.addColorStop(.5,'rgba(255,200,100,.1)');bG.addColorStop(1,'rgba(136,200,255,.15)');
  ctx.strokeStyle=bG;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,45);ctx.lineTo(W,45);ctx.stroke();
  // Title with gradient
  var tg=ctx.createLinearGradient(8,0,100,0);
  tg.addColorStop(0,'#ff88cc');tg.addColorStop(1,'#ffcc88');
  ctx.fillStyle=tg;ctx.font='bold 13px sans-serif';ctx.fillText('北境之王',12,15);
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='8px sans-serif';ctx.fillText('LV'+(level+1)+' '+lc.name,12,28);
  // Score
  ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';ctx.fillText(''+score,120,17);
  if(combo>=3){var m=combo>=10?5:combo>=5?3:2;
    ctx.fillStyle='#ffcc00';ctx.font='bold 10px sans-serif';ctx.shadowColor='#ffcc00';ctx.shadowBlur=6;
    ctx.fillText('COMBO x'+m,120,31);ctx.shadowBlur=0}
  // Stars with glow
  ctx.fillStyle='#ffcc00';ctx.shadowColor='#ffcc00';ctx.shadowBlur=4;
  ctx.font='11px sans-serif';ctx.fillText('★ '+players[0].stars+'/10',230,15);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(136,200,255,.6)';ctx.font='9px sans-serif';ctx.fillText(boss?'BOSS战':killed+'/'+lc.toKill,230,28);
  // Progress bar (rounded, with glow)
  var pw=130,ph=7,px=300,py=22;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.roundRect(px,py,pw,ph,4);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.5;ctx.beginPath();ctx.roundRect(px,py,pw,ph,4);ctx.stroke();
  var prog=boss?1-boss.hp/boss.maxHP:Math.min(killed/lc.toKill,1);
  if(prog>0){
    var pg=ctx.createLinearGradient(px,0,px+pw*prog,0);
    pg.addColorStop(0,'#ff88cc');pg.addColorStop(.5,'#ffaa66');pg.addColorStop(1,'#ffcc00');
    ctx.fillStyle=pg;ctx.shadowColor='#ff88cc';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(px,py,pw*prog,ph,4);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.roundRect(px+1,py+1,Math.max(0,pw*prog-2),ph/2-1,2);ctx.fill();
  }
  // Hearts
  drawHearts(players[0],460,15);
  drawWeaponHUD(players[0],580,15);
  if(twoPlayerMode&&players.length>1){
    drawHearts(players[1],460,31);drawWeaponHUD(players[1],580,31);
    ctx.fillStyle='#ff8888';ctx.font='bold 9px sans-serif';ctx.fillText('P2',444,31);
    ctx.fillStyle='#88ccff';ctx.fillText('P1',444,15);
  }
  ctx.fillStyle='rgba(255,200,0,.5)';ctx.font='9px sans-serif';ctx.fillText(highScore>0?'最高:'+highScore:'',700,15);
  ctx.fillStyle='rgba(136,255,136,.5)';ctx.font='9px sans-serif';ctx.fillText(netMode==='host'?'主机':netMode==='guest'?'客机':netMode==='local'?'本地双人':'',700,28);
  ctx.fillStyle='rgba(255,136,204,.4)';ctx.font='9px sans-serif';ctx.fillText('∞续命',830,15);
}

function drawHearts(p,x,y){
  var maxHP=p.id===0?5:5;
  for(var i=0;i<maxHP;i++){
    var hx=x+i*16,hy=y;
    if(i<p.hp){
      // Heart glow
      ctx.fillStyle='rgba(255,68,102,.12)';ctx.beginPath();ctx.arc(hx,hy+2,9,0,Math.PI*2);ctx.fill();
      // Heart body
      var hG=ctx.createRadialGradient(hx-2,hy-2,0,hx,hy+2,7);
      hG.addColorStop(0,'#ffaacc');hG.addColorStop(.6,'#ff4466');hG.addColorStop(1,'#cc2244');
      ctx.fillStyle=hG;ctx.shadowColor='#ff4466';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(hx-3,hy-1,4,0,Math.PI*2);ctx.arc(hx+3,hy-1,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(hx-7,hy+1);ctx.quadraticCurveTo(hx,hy+8,hx+7,hy+1);ctx.fill();ctx.shadowBlur=0;
      // Heart shine
      ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(hx-2.5,hy-2,1.8,0,Math.PI*2);ctx.fill();
    }else{
      // Empty heart
      ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();
      ctx.arc(hx-3,hy-1,3.5,0,Math.PI*2);ctx.arc(hx+3,hy-1,3.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(hx-6,hy+1);ctx.quadraticCurveTo(hx,hy+7,hx+6,hy+1);ctx.fill();
    }
  }
}

function drawWeaponHUD(p,x,y){
  var wp=WEAPONS[p.wpIdx];
  // Weapon icon background with border
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.beginPath();ctx.roundRect(x-2,y-10,82,15,5);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.5;ctx.beginPath();ctx.roundRect(x-2,y-10,82,15,5);ctx.stroke();
  // Weapon color indicator dot
  ctx.fillStyle=wp.color;ctx.shadowColor=wp.color;ctx.shadowBlur=4;
  ctx.beginPath();ctx.arc(x+5,y-2,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  // Weapon name
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='9px sans-serif';ctx.fillText(wp.name,x+14,y);
}

function drawMinimap(){
  var mw=140,mh=80,mx=W-mw-10,my=H-mh-10;
  var sx=mw/MAP_W,sy=mh/MAP_H;
  // Background with glass effect
  ctx.fillStyle='rgba(10,5,20,.6)';ctx.beginPath();ctx.roundRect(mx-2,my-2,mw+4,mh+4,8);ctx.fill();
  ctx.strokeStyle='rgba(255,200,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(mx-2,my-2,mw+4,mh+4,8);ctx.stroke();
  ctx.fillStyle='rgba(15,10,30,.75)';ctx.beginPath();ctx.roundRect(mx,my,mw,mh,6);ctx.fill();
  // Camera view rectangle
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
  ctx.strokeRect(mx+camX*sx,my+camY*sy,W*sx,H*sy);
  // Enemies
  ctx.fillStyle='#ff4466';
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];if(!e.alive)continue;
    ctx.beginPath();ctx.arc(mx+e.x*sx+14*sx,my+e.y*sy+14*sy,2,0,Math.PI*2);ctx.fill();
  }
  // Boss
  if(boss&&boss.alive){
    ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(mx+(boss.x+35)*sx,my+(boss.y+35)*sy,3.5,0,Math.PI*2);ctx.fill();
  }
  // Players
  for(var p=0;p<players.length;p++){
    var pl=players[p];
    ctx.fillStyle=p===0?'#44ccff':'#ff8866';
    ctx.beginPath();ctx.arc(mx+(pl.x+pl.w/2)*sx,my+(pl.y+pl.h/2)*sy,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(mx+(pl.x+pl.w/2)*sx,my+(pl.y+pl.h/2)*sy,1.5,0,Math.PI*2);ctx.fill();
  }
  // Collectibles
  ctx.fillStyle='rgba(255,200,0,.6)';
  for(var c=0;c<collectibles.length;c++){
    var cl=collectibles[c];ctx.beginPath();ctx.arc(mx+(cl.x+10)*sx,my+(cl.y+10)*sy,1.5,0,Math.PI*2);ctx.fill();
  }
  // Border
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(mx,my,mw,mh,4);ctx.stroke();
}

// ====================================================================
//  EVENTS
// ====================================================================
document.getElementById('startBtn').addEventListener('click',function(){
  initAudio();
  playerName=document.getElementById('playerName').value.trim()||'北北';
  if(netMode==='host'||netMode==='guest'){showConnPanel();return}
  initGame();titleScreen.classList.add('hidden');playBGM();
  if(!loopRunning){loopRunning=true;loop()}
  var n=playerName||'北北';
  showStory(lc.intro.replace(/\{n\}/g,n),'',function(){showBanner()});
});
document.getElementById('restartBtn').addEventListener('click',function(){
  initAudio();initGame();goScreen.classList.add('hidden');playBGM();
  if(!loopRunning){loopRunning=true;loop()}
  var n=playerName||'北北';
  showStory(lc.intro.replace(/\{n\}/g,n),'',function(){showBanner()});
});
document.getElementById('continueBtn').addEventListener('click',function(){initAudio();doContinue()});
document.addEventListener('keydown',function(e){if(continueActive&&(e.code==='Enter'||e.code==='Space')){e.preventDefault();initAudio();doContinue()}});
// ====================================================================
//  MOBILE TOUCH CONTROLS
// ====================================================================
var isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
var touchMap={btnJump:'Space',btnShoot:'KeyJ',btnGrenade:'KeyK',btnSwitch:'KeyQ'};
function setupTouch(){
  if(!isMobile)return;
  var tc=document.getElementById('touchControls');
  tc.style.display='block';
  document.getElementById('mode2').style.display='none';
  // Action buttons
  var btns=tc.querySelectorAll('.touch-btn');
  btns.forEach(function(btn){
    var code=touchMap[btn.id];if(!code)return;
    function onDown(e){e.preventDefault();e.stopPropagation();keys[code]=true;btn.classList.add('pressed')}
    function onUp(e){e.preventDefault();e.stopPropagation();keys[code]=false;btn.classList.remove('pressed')}
    btn.addEventListener('touchstart',onDown,{passive:false});
    btn.addEventListener('touchend',onUp,{passive:false});
    btn.addEventListener('touchcancel',onUp,{passive:false});
  });
  // Virtual joystick
  var joy=document.getElementById('joystick');
  var knob=document.getElementById('joyKnob');
  var joyCx,joyCy,activeTouch=null;
  function updateJoyRect(){
    var b=joy.getBoundingClientRect();
    joyCx=b.left+b.width/2;joyCy=b.top+b.height/2;
  }
  function joyMove(tx,ty){
    var r=joy.offsetWidth/2,knr=knob.offsetWidth/2;
    var maxR=r*0.63;
    var dx=tx-joyCx,dy=ty-joyCy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR}
    knob.style.left=(r-knr+dx)+'px';knob.style.top=(r-knr+dy)+'px';
    knob.style.transition='none';
    var dead=maxR*0.28;
    keys.KeyA=dx<-dead;keys.KeyD=dx>dead;keys.KeyW=dy<-dead;keys.KeyS=dy>dead;
  }
  function joyEnd(){
    var r=joy.offsetWidth/2,knr=knob.offsetWidth/2;
    knob.style.left=(r-knr)+'px';knob.style.top=(r-knr)+'px';
    knob.style.transition='left .12s,top .12s';
    keys.KeyA=false;keys.KeyD=false;keys.KeyW=false;keys.KeyS=false;activeTouch=null;
  }
  joy.addEventListener('touchstart',function(e){
    e.preventDefault();e.stopPropagation();
    updateJoyRect();activeTouch=e.changedTouches[0].identifier;
    joyMove(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  },{passive:false});
  document.addEventListener('touchmove',function(e){
    if(gameOn)e.preventDefault();
    if(activeTouch===null)return;
    for(var i=0;i<e.changedTouches.length;i++){
      var t=e.changedTouches[i];if(t.identifier===activeTouch){joyMove(t.clientX,t.clientY);break}
    }
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(activeTouch===null)return;
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===activeTouch){joyEnd();break}
    }
  },{passive:false});
  document.addEventListener('touchcancel',function(e){
    if(activeTouch===null)return;
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===activeTouch){joyEnd();break}
    }
  },{passive:false});
  // Prevent scrolling on wrap
  document.getElementById('wrap').addEventListener('touchstart',function(e){if(gameOn)e.preventDefault()},{passive:false});
  document.getElementById('continueBtn').addEventListener('touchend',function(e){e.preventDefault();initAudio();doContinue()});
  // Show top buttons
  // touch-specific button handlers (fullscreen moved outside)
}
setupTouch();
// Show top buttons on all devices
document.getElementById('btnFullscreen').style.display='flex';
document.getElementById('btnExit').style.display='flex';
document.getElementById('btnRestart').style.display='flex';
// Fullscreen toggle (desktop + mobile)
(function(){
  var fsBtn=document.getElementById('btnFullscreen');
  var wrapEl=document.getElementById('wrap');
  function toggleFS(e){
    if(e){e.preventDefault();e.stopPropagation()}
    var isFS=document.fullscreenElement||document.webkitFullscreenElement||wrapEl.classList.contains('fs-mode');
    if(isFS){
      if(document.fullscreenElement||document.webkitFullscreenElement){
        (document.exitFullscreen||document.webkitExitFullscreen).call(document);
      }
      wrapEl.classList.remove('fs-mode');
    }else{
      var el=document.documentElement;
      var rfs=el.requestFullscreen||el.webkitRequestFullscreen;
      if(rfs){try{rfs.call(el)}catch(ex){wrapEl.classList.add('fs-mode')} }
      else{wrapEl.classList.add('fs-mode')}
    }
    setTimeout(resizeCanvas,200);
  }
  fsBtn.addEventListener('click',toggleFS);
  document.addEventListener('fullscreenchange',function(){setTimeout(resizeCanvas,200)});
  document.addEventListener('webkitfullscreenchange',function(){setTimeout(resizeCanvas,200)});
})();
// Exit button — back to title screen
document.getElementById('btnExit').addEventListener('click',function(e){
  e.preventDefault();e.stopPropagation();
  gameOn=false;gameEnd=false;stopBGM();
  if(document.fullscreenElement||document.webkitFullscreenElement){
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  }
  titleScreen.classList.remove('hidden');
  goScreen.classList.add('hidden');
  connPanel.classList.add('hidden');
  netMode='';cleanupConn();
  drawBG('candy');ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='18px Courier New';
  ctx.fillText('点击 "出发冒险！" 开始游戏',W/2-150,H/2);
});
// Restart button — restart game directly
document.getElementById('btnRestart').addEventListener('click',function(e){
  e.preventDefault();e.stopPropagation();
  initAudio();initGame();goScreen.classList.add('hidden');showBanner();playBGM();
  if(!loopRunning){loopRunning=true;loop()}
});
// Canvas responsive scaling
function resizeCanvas(){
  var ww=window.innerWidth,wh=window.innerHeight;
  var scale=Math.min(ww/900,wh/500);
  if(scale<1||isMobile){
    if(scale>1)scale=1;
    canvas.style.width=Math.floor(900*scale)+'px';
    canvas.style.height=Math.floor(500*scale)+'px';
  }else{
    canvas.style.width='';canvas.style.height='';
  }
  var wrap=document.getElementById('wrap');
  wrap.style.width=canvas.offsetWidth+'px';
  wrap.style.height=canvas.offsetHeight+'px';
}
window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',function(){setTimeout(resizeCanvas,100)});
resizeCanvas();

// Initial draw
drawBG('candy');ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='18px Courier New';ctx.fillText('点击 "出发冒险！" 开始游戏',W/2-150,H/2);
})();
</script>
